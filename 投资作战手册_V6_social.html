function getCurrency(s){if(s&&(s.currency==='HKD'||s.currency==='CNY'))return s.currency;const c=String((s&&s.code)||'').trim().toUpperCase();return c.endsWith('.HK')?'HKD':'CNY'}

function fxLabel(){const f=(state&&state.fx)||{};const base=`HKD→CNY ${fxHKD().toFixed(4)}`;return f.updatedAt?`${base} · ${f.updatedAt}`:`${base} · 默认值`}
function normalize(s){if(!s.fx||!(Number(s.fx.hkdcny)>0))s.fx={hkdcny:DEFAULT_HKD_CNY,updatedAt:'',source:'默认'};s.stocks=(s.stocks||[]).map(x=>{if(x.currency===undefined)x.currency='';if(x.currentPrice===undefined)x.currentPrice='';if(x.currentValue===undefined)x.currentValue='';if(x.priceUpdatedAt===undefined)x.priceUpdatedAt='';if(x.valueUpdatedAt===undefined)x.valueUpdatedAt='';if(x.code===undefined)x.code=DEFAULT_CODES[x.id]||'';if(x.priceSource===undefined)x.priceSource='';if(x.trimPct===undefined)x.trimPct='';if(x.trimToPct===undefined)x.trimToPct='';if(x.capPct===undefined)x.capPct='';if(x.syncStatus===undefined)x.syncStatus='';if(!x.id)x.id=uid();if(!x.type)x.type='holding';if(!x.role)x.role=x.type==='watching'?'观察仓':'核心仓';if(!x.theme)x.theme='其他';if(!Array.isArray(x.plans))x.plans=[];const refPrice=x.type==='etf'?(Number(x.lastUnitPrice)||null):(Number(x.currentPrice)||null);x.plans=x.plans.map(p=>{if(!p.triggerOn)p.triggerOn=inferTriggerOn(refPrice,p.price,p.action);return p});if(!x.thesis)x.thesis=x.notes||'';if(!x.buyRule){const buys=x.plans.filter(p=>(p.action||'buy')==='buy');x.buyRule=buys.map(p=>`${p.price}：${p.note||'加仓'}`).join('；')||'低于目标仓位且逻辑未变时再考虑。'}if(!x.sellRule){const sells=x.plans.filter(p=>p.action==='sell');x.sellRule=sells.map(p=>`${p.price}：${p.note||'减仓'}`).join('；')||(x.type==='etf'?'不设机械止损，只按目标仓位再平衡。':'逻辑破坏、估值过热或仓位超标时处理。')}return x});return s}

<script>

function exportExecutionLogCsv(){const rows=typeof getExecutionLogRows==='function'?getExecutionLogRows():((state.executionLog||[]).slice().sort((a,b)=>(Number(b.t)||0)-(Number(a.t)||0)));const header=['时间','标的','买/卖','价格','数量','金额','备注','是否自动更新'];const body=rows.map(x=>{const amount=typeof executionLogAmount==='function'?executionLogAmount(x):(Number(x.amount)||Number(x.price)*Number(x.shares)||'');const time=typeof executionLogTime==='function'?executionLogTime(x):(x.t?new Date(Number(x.t)).toLocaleString('zh-CN'):'');const action=typeof executionLogAction==='function'?executionLogAction(x):(x.action==='sell'?'卖出':'买入');return [time,x.stock||'',action,x.price??'',x.shares??'',amount??'',x.note||'',x.autoUpdated?'是':'否'].map(csvCell).join(',')});const csv='\uFEFF'+[header.map(csvCell).join(','),...body].join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const d=new Date();a.href=url;a.download=`操作记录-${dateStamp(d)}-${pad2(d.getHours())}${pad2(d.getMinutes())}.csv`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}

function handleImport(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const parsed=JSON.parse(ev.target.result);const j=normalize(Array.isArray(parsed)?{stocks:parsed,updatedAt:null}:parsed);if(!Array.isArray(j.stocks))return alert('文件格式不正确：请导入包含 stocks 数组的 JSON，或直接导入股票数组 JSON。');if(!confirm(`导入会覆盖当前本地数据，确认继续？\n\n当前：${state.stocks.length} 只\n导入：${j.stocks.length} 只\n\n确认后会先自动下载一份当前数据备份。`))return;autoBackupBeforeImport();state=j;saveState();render();alert('导入成功，已在导入前自动下载当前数据备份。')}catch(err){alert('导入失败：'+err.message)}};r.readAsText(file);e.target.value=''}

<script>
function targetSum(filter){return state.stocks.filter(filter).reduce((a,b)=>a+(Number(b.targetPct)||0),0)}
function plansCount(type){return state.stocks.reduce((a,s)=>a+(s.plans||[]).filter(p=>type==='buy'?(p.action||'buy')==='buy':p.action==='sell').length,0)}
function daysSince(dateStr){if(!dateStr)return null;const t=new Date(dateStr+'T00:00:00').getTime();if(isNaN(t))return null;return Math.floor((Date.now()-t)/86400000)}
function freshnessLabel(dateStr){const d=daysSince(dateStr);if(d===null)return '未记录更新';if(d<=7)return '新';if(d<=30)return '可参考';return '已过期'}
function freshnessText(dateStr){const d=daysSince(dateStr);if(d===null)return '未记录更新';return `更新 ${esc(dateStr)} · ${freshnessLabel(dateStr)}${d>30?' · 建议更新':''}`}
function getCurrentPrice(s){if(s.type==='etf')return null;const v=s.currentPrice;if(v===''||v===null||v===undefined)return null;const n=Number(v);return (isNaN(n)||n<=0)?null:n}
function getMarketValue(s){if(s.type==='etf'){const v=Number(s.currentValue);return (isNaN(v)||v<=0)?null:toCNY(v,s)}const shares=Number(s.shares),cp=Number(s.currentPrice);if(isNaN(shares)||isNaN(cp)||shares<=0||cp<=0)return null;return toCNY(shares*cp,s)}
function getTotalInvested(){return state.stocks.reduce((sum,s)=>sum+(getMarketValue(s)||0),0)}
function isCashRow(s){return s.id==='cash'||s.theme==='现金'||s.role==='现金'}
function getCashMv(){return state.stocks.filter(isCashRow).reduce((a,s)=>a+(getMarketValue(s)||0),0)}
function hasCashRow(){return state.stocks.some(isCashRow)}
function getTrimAction(s,info,total){if(!info||info.actualPct===null||!total)return null;const trim=Number(s.trimPct);if(!(trim>0)||info.actualPct<trim)return null;const to=Number(s.trimToPct);const tgt=(to>0?to:(Number(s.targetPct)||trim));let unitPrice=null;if(s.type==='etf'){if(typeof s.lastUnitPrice==='number'&&s.lastUnitPrice>0)unitPrice=s.lastUnitPrice;else{const sh=Number(s.shares);if(sh>0&&info.mv>0)unitPrice=info.mv/sh}}else unitPrice=getCurrentPrice(s);const deltaMv=info.mv-total*tgt/100;let sharesTxt='';if(unitPrice>0&&deltaMv>0){const raw=deltaMv/toCNY(unitPrice,s);const rounded=Math.max(100,Math.round(raw/100)*100);sharesTxt=`≈卖 ${fmtInt(rounded)} 股/份`}return {trim,toPct:tgt,deltaMv,sharesTxt}}
function themeBreaches(total){const lim=((state.portfolioStrategy||{}).themeLimits)||{};if(!total)return[];const act={};state.stocks.forEach(s=>{if(isCashRow(s))return;const mv=getMarketValue(s)||0;const t=s.theme||'其他';act[t]=(act[t]||0)+mv});const out=[];Object.keys(lim).forEach(name=>{const l=lim[name]||{};const a=(act[name]||0)/total*100;const soft=Number(l.softLimitPct),hard=Number(l.hardLimitPct);if(hard>0&&a>=hard)out.push({name,a,soft,hard,level:'hard'});else if(soft>0&&a>=soft)out.push({name,a,soft,hard,level:'soft'})});return out}
function getEstimatedTotalAssets(){const invested=getTotalInvested();if(invested<=0)return 0;if(hasCashRow())return invested;const sumTargets=state.stocks.reduce((sum,s)=>sum+(Number(s.targetPct)||0),0);const reservePct=Math.max(0,100-sumTargets);if(reservePct<=0||reservePct>=100)return invested;return invested/(1-reservePct/100)}
function getPositionInfo(s,total){const target=Number(s.targetPct);const mv=getMarketValue(s);if(isNaN(target)||target<=0)return null;if(mv===null)return {target,actualPct:null,deviation:null,mv:null,status:'no-price'};if(!total||total<=0)return {target,actualPct:null,deviation:null,mv,status:'no-total'};const actualPct=mv/total*100;const deviation=actualPct-target;let status='balanced';if(deviation>5)status='overweight';else if(deviation<-5)status='underweight';return {target,actualPct,deviation,mv,status}}
function fmtMoney(n){if(n===null||n===undefined||isNaN(n))return '—';const v=Math.abs(n);if(v>=100000000)return (n/100000000).toFixed(2)+'亿';if(v>=10000)return (n/10000).toFixed(1)+'万';return Math.round(n).toLocaleString('en-US')}

<script>
function getRebalanceAction(s,info,total){
  if(!info||info.deviation===null||info.status==='balanced'||info.status==='no-price'||info.status==='no-total')return null;
  let unitPrice=null;
  if(s.type==='etf'){
    const sh=Number(s.shares);
    if(typeof s.lastUnitPrice==='number'&&s.lastUnitPrice>0)unitPrice=s.lastUnitPrice;
    else if(sh>0&&info.mv>0)unitPrice=info.mv/sh;
  }else{
    unitPrice=getCurrentPrice(s);
  }
  if(!unitPrice||unitPrice<=0)return null;
  const unitCny=toCNY(unitPrice,s);
  const targetMv=total*info.target/100;
  const deltaMv=info.mv-targetMv;
  const rawShares=deltaMv/unitCny;
  const rounded=Math.round(rawShares/100)*100;
  if(Math.abs(rounded)<100)return null;
  return {shares:Math.abs(rounded),money:Math.abs(rounded*unitCny),direction:rounded>0?'sell':'buy',unitPrice,currency:getCurrency(s)};
}
function inferTriggerOn(currentPrice,targetPrice,action){
  const cp=Number(currentPrice),tp=Number(targetPrice);
  if(isNaN(cp)||cp<=0||isNaN(tp)||tp<=0){
    // 没有当前价信息时按传统默认
    return action==='sell'?'above':'below';
  }
  // 目标价 > 当前价 → 等涨上去触发；反之等跌下来触发
  return tp>cp?'above':'below';
}
function planGap(cp,tp,action,triggerOn){
  if(cp==null)return null;
  const t=Number(tp);
  if(isNaN(t)||t<=0)return null;
  const isBuy=(action||'buy')==='buy';
  // 优先用显式 triggerOn；没有则按当前价 vs 目标价自动推断（兜底）
  const direction=triggerOn||(t>cp?'above':'below');
  const triggered=direction==='below'?cp<=t:cp>=t;
  const pct=direction==='below'?(cp-t)/cp*100:(t-cp)/cp*100;
  return {triggered,pct,absPct:Math.abs(pct),isBuy,direction};
}
function stockUrgency(s){const cp=getCurrentPrice(s);if(cp==null)return {score:Infinity,triggered:0,nearest:null};let minAbs=Infinity,triggered=0,nearest=null;for(const p of (s.plans||[])){const g=planGap(cp,p.price,p.action,p.triggerOn);if(!g)continue;if(g.triggered)triggered++;if(g.absPct<minAbs){minAbs=g.absPct;nearest=g}}if(minAbs===Infinity)return {score:Infinity,triggered:0,nearest:null};return {score:triggered>0?-1000+minAbs:minAbs,triggered,nearest}}
function executePlan(stockId,planId){const s=state.stocks.find(x=>x.id===stockId);if(!s)return;const p=(s.plans||[]).find(x=>x.id===planId);if(!p)return;const isBuy=(p.action||'buy')==='buy';const verb=isBuy?'加仓':'减仓';const total=getEstimatedTotalAssets();let warn='';if(total>0){const mvNow=getMarketValue(s)||0;const amt=toCNY(p.price*p.shares,s);const pctAfter=(mvNow+(isBuy?amt:-amt))/total*100;if(isBuy){const cap=Number(s.capPct),trim=Number(s.trimPct);if(cap>0&&pctAfter>=cap)warn+=`\n✖ 买入后「${s.name}」约 ${pctAfter.toFixed(1)}%，已达冻结线 ${cap}% —— 按手册规则不应执行！`;else if(trim>0&&pctAfter>=trim)warn+=`\n⚠ 买入后「${s.name}」约 ${pctAfter.toFixed(1)}%，已达削减线 ${trim}%`;const lim=((state.portfolioStrategy||{}).themeLimits||{})[s.theme];if(lim){const themeMv=state.stocks.filter(x=>!isCashRow(x)&&(x.theme||'其他')===s.theme).reduce((a,x)=>a+(getMarketValue(x)||0),0)+amt;const tp=themeMv/total*100;const soft=Number(lim.softLimitPct),hard=Number(lim.hardLimitPct);if(hard>0&&tp>=hard)warn+=`\n✖ 买入后「${s.theme}」主题约 ${tp.toFixed(1)}%，已达硬上限 ${hard}%`;else if(soft>0&&tp>=soft)warn+=`\n⚠ 买入后「${s.theme}」主题约 ${tp.toFixed(1)}%，已达软上限 ${soft}%`}if(hasCashRow()){const minCash=Number(((state.portfolioStrategy||{}).minimumCashPct)||(((state.portfolioStrategy||{}).cashRule||{}).minimumCashPct)||0);const cashAfter=(getCashMv()-amt)/total*100;if(minCash>0&&cashAfter<minCash)warn+=`\n⚠ 买入后现金约 ${cashAfter.toFixed(1)}%，低于 ${minCash}% 底线（手册：仅多标的同时进入战略买点可短期至10%）`}}else{const trim=Number(s.trimPct);if(trim>0&&pctAfter>=trim)warn+=`\n提示：卖出后「${s.name}」仍约 ${pctAfter.toFixed(1)}%（≥削减线 ${trim}%），可考虑加大卖出数量`}}const msg=`确认已执行「${s.name}」的${verb}计划？\n\n  目标价 ${p.price} × ${p.shares} 股${p.note?'\n  备注：'+p.note:''}${warn?'\n\n—— 纪律检查 ——'+warn:''}\n\n执行后这条计划将从列表中删除。`;if(!confirm(msg))return;const sh0=Number(s.shares)||0;const newShares=isBuy?sh0+p.shares:Math.max(0,sh0-p.shares);const auto=confirm(`是否自动更新持仓与现金台账？\n\n  股数/份额：${fmtInt(sh0)} → ${fmtInt(newShares)}${isBuy?'\n  成本价：按 '+p.price+' 加权摊入':'\n  成本价：保持不变'}${s.type==='etf'?'\n  当前市值：按 价格×数量 同步调整':''}${hasCashRow()?'\n  现金台账：'+(isBuy?'扣减':'增加')+' 约 '+fmtMoney(toCNY(p.price*p.shares,s)):''}\n\n点「取消」则仅删除计划，持仓需自行到「编辑」更新。`);const today=new Date().toISOString().slice(0,10);if(auto){const oc=Number(s.avgCost);if(isBuy){if(sh0>0&&!isNaN(oc)&&oc>0)s.avgCost=Number((((oc*sh0)+(p.price*p.shares))/newShares).toFixed(4));else s.avgCost=p.price}s.shares=newShares;if(s.type==='etf'){const cv=Number(s.currentValue)||0;s.currentValue=Number(Math.max(0,cv+(isBuy?1:-1)*p.price*p.shares).toFixed(2));s.valueUpdatedAt=today}const cashRow=state.stocks.find(isCashRow);if(cashRow){const amt2=toCNY(p.price*p.shares,s);const cv2=Number(cashRow.currentValue)||0;cashRow.currentValue=Number((cv2+(isBuy?-amt2:amt2)).toFixed(2));cashRow.valueUpdatedAt=today;cashRow.updatedAt=Date.now()}}(state.executionLog=state.executionLog||[]).push({t:Date.now(),stock:s.name,action:isBuy?'buy':'sell',price:p.price,shares:p.shares,autoUpdated:!!auto,note:p.note||''});s.plans=(s.plans||[]).filter(x=>x.id!==planId);s.updatedAt=Date.now();saveState();render()}

</script>
<script>
let social_posts=[];
let socialPosts=social_posts;
let socialPostsLoaded=false;

function normalizeSocialPost(p){
  const rawSentiment=String(p.sentiment||'neutral').trim().toLowerCase();
  const sentiment=rawSentiment==='bullish'?'positive':(rawSentiment==='bearish'?'negative':rawSentiment);
  return {
    platform:String(p.platform||'').trim(),
    symbol:String(p.symbol||'').trim(),
    company:String(p.company||'').trim(),
    post_time:String(p.post_time||'').trim(),
    content:String(p.content||'').trim(),
    url:String(p.url||'').trim(),
    likes:Number(p.likes)||0,
    comments:Number(p.comments)||0,
    sentiment,
    tags:Array.isArray(p.tags)?p.tags.map(String):(Array.isArray(p.matched_keywords)?p.matched_keywords.map(String):[]),
    summary:String(p.summary||'').trim(),
    risk_points:Array.isArray(p.risk_points)?p.risk_points.map(String):[]
  };
}

function setSocialPosts(data){
  const arr=Array.isArray(data)?data:(Array.isArray(data&&data.social_posts)?data.social_posts:[]);
  social_posts=arr.map(normalizeSocialPost);
  socialPosts=social_posts;
  socialPostsLoaded=true;
}

async function loadSocialPosts(){
  try{
    const res=await fetch('social_posts.json',{cache:'no-store'});
    if(!res.ok)throw new Error('social_posts.json '+res.status);
    setSocialPosts(await res.json());
  }catch(e){
    setSocialPosts(window.SOCIAL_POSTS||[]);
    console.warn('social_posts.json 未加载，使用内置空数据。',e);
  }
}

function socialSymbolKeys(s){
  const code=String(s.code||'').trim().toUpperCase();
  const noSuffix=code.replace(/\.(HK|SS|SZ)$/,'').replace(/^0+/,'');
  return [code,noSuffix,String(s.id||'').trim().toUpperCase(),String(s.name||'').trim()].filter(Boolean);
}

function socialPostsForStock(s){
  const keys=socialSymbolKeys(s);
  const name=String(s.name||'').trim();
  return socialPosts.filter(p=>{
    const symbol=String(p.symbol||'').trim().toUpperCase();
    const company=String(p.company||'').trim();
    return keys.includes(symbol)||company===name||company.includes(name)||name.includes(company);
  });
}

function socialTodayKey(){
  return new Date().toISOString().slice(0,10);
}

function socialPostScore(p){
  return (Number(p.likes)||0)+(Number(p.comments)||0)*2;
}

function socialSentimentLabel(posts){
  const score=posts.reduce((sum,p)=>sum+(p.sentiment==='positive'?1:p.sentiment==='negative'?-1:0),0);
  if(score>1)return '偏利多';
  if(score<-1)return '偏利空';
  if(score===1)return '略偏利多';
  if(score===-1)return '略偏利空';
  return '中性/分歧';
}

function socialPointList(posts,sentiment,limit){
  const items=posts
    .filter(p=>p.sentiment===sentiment)
    .sort((a,b)=>socialPostScore(b)-socialPostScore(a))
    .map(p=>p.summary||p.content)
    .filter(Boolean);
  return [...new Set(items)].slice(0,limit);
}

function socialRiskList(posts,limit){
  const risks=posts.flatMap(p=>p.risk_points||[]).filter(Boolean);
  return [...new Set(risks)].slice(0,limit);
}

function socialTagsHtml(tags){
  if(!tags||!tags.length)return '';
  return `<div class="social-tags">${tags.slice(0,6).map(t=>`<span class="social-tag">${esc(t)}</span>`).join('')}</div>`;
}

function socialPanel(s){
  if(s.type==='etf')return '';
  const posts=socialPostsForStock(s);
  const today=socialTodayKey();
  const todayPosts=posts.filter(p=>String(p.post_time||'').slice(0,10)===today);
  const todayHeat=todayPosts.reduce((sum,p)=>sum+socialPostScore(p),0);
  const positive=socialPointList(posts,'positive',3);
  const negative=socialPointList(posts,'negative',3);
  const risks=socialRiskList(posts,4);
  const representative=posts.slice().sort((a,b)=>socialPostScore(b)-socialPostScore(a)).slice(0,3);
  const loading=!socialPostsLoaded?'<div class="social-empty">社媒数据加载中...</div>':'';
  const empty=socialPostsLoaded&&!posts.length?'<div class="social-empty">暂无匹配的本地社媒帖子。可在 social_posts.json 中按 symbol 或 company 添加记录。</div>':'';
  const list=(arr,emptyText,cls='')=>arr.length?arr.map(x=>`<div${cls?` class="${cls}"`:''}>${esc(x)}</div>`).join(''):`<span class="muted">${emptyText}</span>`;
  const postsHtml=representative.map(p=>`<div class="social-post"><div class="social-post-head"><span>${esc(p.platform||'社媒')} · ${esc(p.post_time||'')}</span><span>${fmtInt(p.likes)} 赞 / ${fmtInt(p.comments)} 评</span></div><div>${esc(p.summary||p.content)}</div>${p.url?`<div><a href="${esc(p.url)}" target="_blank" rel="noopener">原帖链接</a></div>`:''}${socialTagsHtml(p.tags)}</div>`).join('');
  return `<tr class="social-row"><td class="social-cell" colspan="10"><details class="social-panel"><summary>社媒舆情 · ${posts.length} 条${todayPosts.length?` · 今日 ${todayPosts.length} 条`:''}</summary>${loading}${empty}${posts.length?`<div class="social-grid"><div class="social-metric"><div class="social-label">今日热度</div><div class="social-value">${fmtInt(todayHeat)}${todayPosts.length?' / '+todayPosts.length+'帖':' / 无今日帖'}</div></div><div class="social-metric"><div class="social-label">舆情倾向</div><div class="social-value">${socialSentimentLabel(posts)}</div></div><div class="social-metric"><div class="social-label">利多观点</div><div class="social-value">${list(positive,'暂无')}</div></div><div class="social-metric"><div class="social-label">利空观点</div><div class="social-value">${list(negative,'暂无')}</div></div><div class="social-metric"><div class="social-label">风险提醒</div><div class="social-value">${list(risks,'暂无','social-risk')}</div></div></div><div class="card-title">最近代表性帖子</div><div class="social-list">${postsHtml||'<div class="social-empty">暂无代表性帖子</div>'}</div>`:''}</details></td></tr>`;
}

<script>

function currentDisplay(s){const isEtf=s.type==='etf';const val=isEtf?fmtMaybe(s.currentValue,0):fmtMaybe(s.currentPrice);const curTag=(getCurrency(s)==='HKD'&&val!=='—')?' <span class="muted" style="font-size:11px;font-weight:400">HKD</span>':'';const date=isEtf?s.valueUpdatedAt:s.priceUpdatedAt;const code=!isEtf&&s.code?` · ${esc(s.code)}`:'';const source=!isEtf&&s.priceSource?` · ${esc(s.priceSource)}`:'';const status=s.syncStatus==='failed'?' · 刷新失败':(s.syncStatus==='updating'?' · 刷新中':'');const chg=s.dailyChange;const chgHtml=(typeof chg==='number'&&!isNaN(chg))?` <span class="daily-chg ${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span>`:'';return `${val}${curTag}${chgHtml}<div class="text">${freshnessText(date)}${code}${source}${status}</div>`}
function stalePanel(){const items=state.stocks.map(s=>{const date=s.type==='etf'?s.valueUpdatedAt:s.priceUpdatedAt;const val=s.type==='etf'?s.currentValue:s.currentPrice;return {s,date,val,days:daysSince(date)}}).filter(x=>x.val!==''&&x.val!==undefined&&x.val!==null&&(x.days===null||x.days>30));if(!items.length)return '<div class="card" style="margin-bottom:14px"><div class="card-title">数据更新提醒</div><div class="card-note">当前没有超过30天的价格/市值数据。</div></div>';return `<div class="card" style="margin-bottom:14px"><div class="card-title">数据更新提醒（${items.length} 项）</div><div class="stale-list">${items.map(x=>{const days=x.days;const urgent=days===null||days>60;const meta=days===null?'未记录更新时间':`已 ${days} 天未更新`;return `<div class="stale-row"><div class="stale-name">${esc(x.s.name)} <span class="muted" style="font-weight:400">· ${x.s.type==='etf'?'市值':'价格'}</span></div><div class="stale-meta${urgent?' urgent':''}">${meta}</div></div>`}).join('')}</div><div class="alert" style="margin-top:10px">这些数据可能已经不适合直接用于决策。建议按月更新ETF市值，按需更新重点个股价格。</div></div>`}

function render(){const d=new Date();document.getElementById('dateStamp').textContent=d.toISOString().slice(0,10).replace(/-/g,'.')+' · '+d.toLocaleDateString('zh-CN',{weekday:'long'});document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===currentTab));document.getElementById('countHolding').textContent=state.stocks.filter(s=>s.type==='holding').length;document.getElementById('countEtf').textContent=state.stocks.filter(s=>s.type==='etf').length;document.getElementById('countWatching').textContent=state.stocks.filter(s=>s.type==='watching').length;document.getElementById('syncHint').textContent=(state.updatedAt?'最后修改 · '+new Date(state.updatedAt).toLocaleString('zh-CN'):'')+backupReminderText();const fxBtn=document.getElementById('fxBtn');if(fxBtn)fxBtn.textContent=fxLabel();if(detailStockId)renderStockDetail();else if(currentTab==='dashboard')renderDashboard();else if(currentTab==='logs')renderExecutionLog();else renderTable()}
function renderDashboard(){if(!state.stocks.length){document.getElementById('summary').innerHTML='暂无数据 · 请先导入 JSON';document.getElementById('main').innerHTML='<div class="hint"><b>尚未导入组合数据。</b> 点击右上角「导入JSON」选择之前导出的投资作战手册 JSON；程序不会再内置或自动恢复默认组合。</div><div class="empty">导入后这里会显示总览、触发计划和再平衡提示。</div>';return}const themeOrder=['宽基指数','黄金资源','AI科技','消费','防御','其他'];const themes=[...new Set([...themeOrder,...state.stocks.filter(s=>!isCashRow(s)).map(s=>s.theme||'其他')])];const roleOrder=['核心仓','成长仓','卫星仓','观察仓','防御核心仓'];const roles=[...new Set([...roleOrder,...state.stocks.filter(s=>!isCashRow(s)).map(s=>s.role||'其他')])];const themeRows=themes.map(name=>({name,p:targetSum(s=>s.theme===name)}));const roleRows=roles.map(name=>({name,p:targetSum(s=>s.role===name)}));const total=targetSum(s=>!isCashRow(s));const reserve=100-total;const ai=themeRows.find(x=>x.name==='AI科技').p,res=themeRows.find(x=>x.name==='黄金资源').p;const totalMv=getTotalInvested();const estAssets=getEstimatedTotalAssets();const allTrig=state.stocks.map(s=>({s,u:stockUrgency(s)})).filter(x=>x.u.triggered>0);const totalTrig=allTrig.reduce((a,b)=>a+b.u.triggered,0);const trigBadge=totalTrig>0?` · <strong style="color:var(--seal)">⚠ 已触发 ${totalTrig} 条</strong>`:'';const allInfo=state.stocks.map(s=>({s,info:getPositionInfo(s,estAssets)})).filter(x=>x.info&&x.info.deviation!==null);const rebalList=allInfo.filter(x=>Math.abs(x.info.deviation)>5).sort((a,b)=>Math.abs(b.info.deviation)-Math.abs(a.info.deviation));const noPriceCount=state.stocks.filter(s=>{const t=Number(s.targetPct);if(isNaN(t)||t<=0)return false;return getMarketValue(s)===null}).length;const rebalBadge=rebalList.length>0?` · <strong style="color:var(--gold)">⚖ 需再平衡 ${rebalList.length} 只</strong>`:'';document.getElementById('summary').innerHTML=`总市值 <strong>${fmtMoney(totalMv)}</strong> · 标的 <strong>${state.stocks.length}</strong> 只 · 资产目标 <strong>${fmt(total,1)}%</strong> · ${reserve>=0?'现金/机动 <strong>'+fmt(reserve,1)+'%</strong>':'超配 <strong>'+fmt(Math.abs(reserve),1)+'%</strong>'}${hasCashRow()?' · 实际现金 <strong>'+fmt(getCashMv()/(estAssets||1)*100,1)+'%</strong>':''}${trigBadge}${rebalBadge}`;const trigPanel=allTrig.length?`<div class="card" style="border-left:3px solid var(--seal);margin-bottom:14px"><div class="card-title" style="color:var(--seal);margin-bottom:10px">⚠ 已触发的价位计划（${totalTrig} 条）</div><div class="trig-list">${allTrig.map(x=>{const cp=getCurrentPrice(x.s);const triggeredPlans=(x.s.plans||[]).filter(p=>{const g=planGap(cp,p.price,p.action,p.triggerOn);return g&&g.triggered});return triggeredPlans.map(p=>{const isBuy=(p.action||'buy')==='buy';const g=planGap(cp,p.price,p.action,p.triggerOn);const cls=isBuy?'buy':'sell';const dir=g.direction==='below'?'低于目标':'高于目标';return `<div class="trig-row ${cls}"><div class="trig-name">${esc(x.s.name)}</div><div class="trig-dist">${dir} ${g.absPct.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">${isBuy?'▲ 加仓':'▼ 减仓'}</span>目标 ${fmtMaybe(p.price)} · ${fmtInt(p.shares)} 股${p.note?' · '+esc(p.note):''}</div><div class="trig-action"><button data-execute-stock="${x.s.id}" data-execute-plan="${p.id}">✓ 已执行 / 移除提示</button></div></div>`}).join('')}).join('')}</div><div class="alert" style="margin-top:10px">这些价位计划已经满足条件。点击「已执行」会从计划中删除这条；若只是先观望，可忽略不动。</div></div>`:'';const rebalPanel=rebalList.length?`<div class="card" style="border-left:3px solid var(--gold);margin-bottom:14px"><div class="card-title" style="color:var(--gold);margin-bottom:10px">⚖ 需要再平衡（偏差 > 5 个百分点 · ${rebalList.length} 只）</div><div class="trig-list">${rebalList.map(x=>{const over=x.info.status==='overweight';const cls=over?'sell':'buy';const sign=x.info.deviation>=0?'+':'';const act=getRebalanceAction(x.s,x.info,estAssets);const suggest=act?`<div class="trig-suggest"><span class="trig-tag">${act.direction==='sell'?'▼ 建议卖':'▲ 建议买'}</span>≈${fmtInt(act.shares)} 股 · 约 ${fmtMoney(act.money)}（按 ${fmtMaybe(act.unitPrice)}${act.currency==='HKD'?' HKD':''} 算）</div>`:'';return `<div class="trig-row ${cls}"><div class="trig-name">${esc(x.s.name)}</div><div class="trig-dist">${over?'超配':'低配'} ${sign}${x.info.deviation.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">${over?(isCashRow(x.s)?'▼ 按优先级部署':'▼ 减仓'):'▲ 补仓'}</span>目标 ${x.info.target.toFixed(1)}% · 实际 ${x.info.actualPct.toFixed(1)}% · 市值 ${fmtMoney(x.info.mv)}</div>${suggest}</div>`}).join('')}</div><div class="alert" style="margin-top:10px">建议股数按 100 股粒度取整，实际下单请遵守港股/A股最小手数规则。</div></div>`:'';const trimAlerts=state.stocks.map(s=>({s,info:getPositionInfo(s,estAssets)})).map(x=>({s:x.s,info:x.info,act:getTrimAction(x.s,x.info,estAssets)})).filter(x=>x.act);const capAlerts=state.stocks.map(s=>({s,info:getPositionInfo(s,estAssets)})).filter(x=>{const cap=Number(x.s.capPct);return cap>0&&x.info&&x.info.actualPct!==null&&x.info.actualPct>=cap});const tb=themeBreaches(estAssets);const minCash=Number(((state.portfolioStrategy||{}).minimumCashPct)||(((state.portfolioStrategy||{}).cashRule||{}).minimumCashPct)||0);const cashPctNow=hasCashRow()?getCashMv()/(estAssets||1)*100:null;const discRows=[...capAlerts.map(x=>`<div class="trig-row sell"><div class="trig-name">${esc(x.s.name)}</div><div class="trig-dist">占比 ${x.info.actualPct.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">✖ 冻结线</span>已≥冻结线 ${Number(x.s.capPct)}% —— 该标的一切买入计划暂停执行</div></div>`),...trimAlerts.map(x=>`<div class="trig-row sell"><div class="trig-name">${esc(x.s.name)}</div><div class="trig-dist">占比 ${x.info.actualPct.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">▼ 削减线</span>已≥${x.act.trim}% → 按规则削回 ${x.act.toPct}%${x.act.sharesTxt?'（'+x.act.sharesTxt+'）':''}</div></div>`),...tb.map(t=>`<div class="trig-row ${t.level==='hard'?'sell':''}"><div class="trig-name">主题·${esc(t.name)}</div><div class="trig-dist">实际 ${t.a.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">${t.level==='hard'?'✖ 超硬上限':'⚠ 超软上限'}</span>软 ${t.soft}% / 硬 ${t.hard}% —— 该主题新买入需过手册检查清单</div></div>`),...((cashPctNow!==null&&minCash>0&&cashPctNow<minCash)?[`<div class="trig-row sell"><div class="trig-name">现金底线</div><div class="trig-dist">实际 ${cashPctNow.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">⚠ 低于底线</span>手册要求 ≥${minCash}%（仅多标的同时进入战略买点可短期至10%）</div></div>`]:[])];const discPanel=discRows.length?`<div class="card" style="border-left:3px solid var(--seal);margin-bottom:14px"><div class="card-title" style="color:var(--seal);margin-bottom:10px">🛑 纪律警报（${discRows.length} 条 · 依据手册规则实时计算）</div><div class="trig-list">${discRows.join('')}</div></div>`:'';const noPriceHint=noPriceCount>0?`<div class="hint" style="border-left:3px solid var(--gold)"><b>⚑ ${noPriceCount} 只标的未填当前${noPriceCount===1?'价格/市值':'价格或市值'}</b>，这些标的的实际仓位和偏差无法计算，仪表盘数据可能不准确。建议进入对应分页补充。</div>`:'';document.getElementById('main').innerHTML=`${trigPanel}${discPanel}${rebalPanel}${stalePanel()}${noPriceHint}<div class="hint"><b>定位：</b>这里不是第二个交易软件，不计算实时盈亏。它只记录"为什么买、什么情况下卖、到什么价位做什么"，用于减少关键位置的犹豫。${hasCashRow()?'总资产 = 全部持仓与「现金」行市值的真实合计（旧版按目标比例反推的口径已修正）。':'实际占比按「持有现金=目标现金比例」估算总资产；建议新增一行主题为「现金」的虚拟持仓以启用真实口径。'}港股(HKD)的市值已按 HKD→CNY 汇率折算为人民币后参与总市值与仓位偏差计算，点击顶部「汇率」按钮可联网刷新或手动设置。</div><div class="dash"><div class="card"><div class="card-title">资产目标合计</div><div class="card-num">${fmt(total,1)}%</div><div class="card-note">不含现金/机动资金。</div></div><div class="card"><div class="card-title">现金/机动</div><div class="card-num">${reserve>=0?fmt(reserve,1):'超'+fmt(Math.abs(reserve),1)}%</div><div class="card-note">${hasCashRow()?('实际现金 '+fmt(getCashMv()/(estAssets||1)*100,1)+'%（手册底线见纪律警报）'):'用于等待回调、补核心仓或风险缓冲。'}</div></div><div class="card"><div class="card-title">AI科技目标</div><div class="card-num">${fmt(ai,1)}%</div><div class="card-note">${(()=>{const l=((state.portfolioStrategy||{}).themeLimits||{})['AI科技'];return l?('软上限 '+l.softLimitPct+'% / 硬上限 '+l.hardLimitPct+'%（实际敞口见纪律警报）'):'建议总量约20%-30%，超出后少追。'})()}</div></div><div class="card"><div class="card-title">黄金资源目标</div><div class="card-num">${fmt(res,1)}%</div><div class="card-note">紫金+黄金ETF+有色需合并看。</div></div></div><div class="dash"><div class="card" style="grid-column:span 2"><div class="card-title">主题目标仓位</div><div class="bar-list">${bars(themeRows.concat([{name:'现金/机动',p:Math.max(reserve,0)}]))}</div>${reserve<0?'<div class="alert">目标仓位合计超过100%，需要降低部分标的目标仓位。</div>':(ai>30?'<div class="alert">AI科技目标仓位约30%，新增资金不宜继续集中追科技方向。</div>':'')}</div><div class="card" style="grid-column:span 2"><div class="card-title">角色目标仓位</div><div class="bar-list">${bars(roleRows)}</div>${res>25?'<div class="alert">黄金资源目标仓位超过25%，上涨阶段应以再平衡和止盈纪律为主。</div>':''}</div></div>`;document.querySelectorAll('[data-execute-stock]').forEach(b=>b.addEventListener('click',()=>executePlan(b.dataset.executeStock,b.dataset.executePlan)))}
function bars(rows){return rows.map(r=>`<div class="bar-row"><div>${esc(r.name)}</div><div class="bar-bg"><div class="bar ${r.name.includes('AI')?'ai':r.name.includes('黄金')?'res':r.name.includes('核心')||r.name.includes('宽基')?'core':r.name.includes('卫星')?'sat':''}" style="width:${Math.min(100,r.p)}%"></div></div><div class="num">${fmt(r.p,1)}%</div></div>`).join('')}
function filtered(){return state.stocks.filter(s=>s.type===currentTab)}
function renderTable(){const raw=filtered();const total=getEstimatedTotalAssets();const withU=raw.map(s=>({s,u:stockUrgency(s),info:getPositionInfo(s,total)}));withU.sort((a,b)=>a.u.score-b.u.score);const arr=withU.map(x=>x.s);const totalTrig=withU.reduce((a,b)=>a+b.u.triggered,0);const tabMv=raw.reduce((a,s)=>a+(getMarketValue(s)||0),0);const overweights=withU.filter(x=>x.info&&x.info.status==='overweight').length;const underweights=withU.filter(x=>x.info&&x.info.status==='underweight').length;const typeName=currentTab==='holding'?'个股':currentTab==='etf'?'ETF':'观察';const trigBadge=totalTrig>0?` · <strong style="color:var(--seal)">⚠ 已触发 ${totalTrig} 条</strong>`:'';const rebalBadge=(overweights+underweights)>0?` · <strong style="color:var(--gold)">⚖ 偏差>5% ${overweights+underweights} 只</strong>`:'';document.getElementById('summary').innerHTML=`${typeName} <strong>${arr.length}</strong> 只 · 目标 <strong>${fmt(arr.reduce((a,b)=>a+(Number(b.targetPct)||0),0),1)}%</strong> · 市值 <strong>${fmtMoney(tabMv)}</strong>${trigBadge}${rebalBadge}`;const main=document.getElementById('main');if(!arr.length){main.innerHTML='<div class="empty">暂无标的</div>';return}const trigAlert=totalTrig>0?`<div class="alert-trig">⚠ 当前有 ${totalTrig} 条价位计划已触发，已置顶显示。</div>`:'';main.innerHTML=`${trigAlert}<div class="table-wrap"><table><colgroup><col style="width:7%"><col style="width:6.5%"><col style="width:9.5%"><col style="width:16%"><col style="width:19%"><col style="width:14.5%"><col style="width:5.5%"><col style="width:9.5%"><col style="width:6%"><col style="width:6.5%"></colgroup><thead><tr><th>名称</th><th>定位/主题</th><th>目标/实际</th><th>为什么持有</th><th>加仓/建仓动作</th><th>卖出/降仓条件</th><th>成本</th><th>${currentTab==='etf'?'当前市值':'当前价格'}</th><th>数量</th><th>操作</th></tr></thead><tbody>${arr.map(s=>row(s,total)+(typeof socialPanel==='function'?socialPanel(s):'')).join('')}</tbody></table></div>`;main.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',()=>{if(b.dataset.action==='detail')openStockDetail(b.dataset.id);if(b.dataset.action==='refresh')refreshOnePrice(b.dataset.id);if(b.dataset.action==='edit')openModal(b.dataset.id);if(b.dataset.action==='delete')del(b.dataset.id)}))}
function row(s,total){const cp=getCurrentPrice(s);const buys=(s.plans||[]).filter(p=>(p.action||'buy')==='buy').sort((a,b)=>Number(b.price||0)-Number(a.price||0));const sells=(s.plans||[]).filter(p=>p.action==='sell').sort((a,b)=>Number(b.price||0)-Number(a.price||0));const info=getPositionInfo(s,total);let targetCell='';if(!info)targetCell=`<div class="target-line">${fmtMaybe(s.targetPct,1)}%</div>`;else if(info.status==='no-price')targetCell=`<div class="target-line">${info.target.toFixed(1)}%</div><div class="actual-line">实际：未填${s.type==='etf'?'当前市值':'当前价格'}</div><span class="dev-badge na">无法计算偏差</span>`;else{const sign=info.deviation>=0?'+':'';const cls=info.status==='overweight'?'over':info.status==='underweight'?'under':'ok';const word=info.status==='overweight'?'超配':info.status==='underweight'?'低配':'平衡';targetCell=`<div class="target-line">${info.target.toFixed(1)}%</div><div class="actual-line">实际 ${info.actualPct.toFixed(1)}% · ${fmtMoney(info.mv)}</div><span class="dev-badge ${cls}">${word} ${sign}${info.deviation.toFixed(1)}%</span>`;const _cap=Number(s.capPct);if(_cap>0&&info.actualPct>=_cap)targetCell+=`<span class="dev-badge over">✖ ≥冻结线${_cap}%·禁买</span>`;const _ta=getTrimAction(s,info,total);if(_ta)targetCell+=`<span class="dev-badge over">▼ 削减线${_ta.trim}%→削回${_ta.toPct}%${_ta.sharesTxt?'·'+_ta.sharesTxt:''}</span>`}return `<tr><td class="name cell-name"><button class="link-btn detail-name" data-action="detail" data-id="${s.id}">${esc(s.name)}</button></td><td class="cell-role" data-label="定位/主题"><div class="chips"><span class="chip role">${esc(s.role||'—')}</span><span class="chip tag">${esc(s.theme||'—')}</span></div></td><td class="num cell-target" data-label="目标 / 实际">${targetCell}</td><td class="text cell-thesis" data-label="为什么持有">${esc(s.thesis||s.notes||'')||'<span class="muted">—</span>'}</td><td class="cell-buy" data-label="加仓/建仓">${chips(buys,'buy',cp)||'<div class="text">'+esc(s.buyRule||'—')+'</div>'}</td><td class="cell-sell" data-label="卖出/降仓"><div class="text">${esc(s.sellRule||'—')}</div>${sells.length?chips(sells,'sell',cp):''}</td><td class="num cell-cost" data-label="成本">${fmtMaybe(s.avgCost)}</td><td class="num cell-current" data-label="${s.type==='etf'?'当前市值':'当前价格'}">${currentDisplay(s)}</td><td class="num cell-shares" data-label="数量">${fmtInt(s.shares)}</td><td class="cell-actions"><div class="row-actions"><button class="link-btn" data-action="refresh" data-id="${s.id}">${s.type==='etf'?'刷新市值':'刷新价格'}</button><button class="link-btn" data-action="edit" data-id="${s.id}">编辑</button><button class="link-btn danger" data-action="delete" data-id="${s.id}">删除</button></div></td></tr>`}
function chips(ps,type,cp){if(!ps.length)return'';return `<div class="chips">${ps.map(p=>{const g=planGap(cp,p.price,type,p.triggerOn);const trigCls=(g&&g.triggered)?' triggered':'';const arrow=g?(g.direction==='below'?'↓':'↑'):'';const gapHtml=g?(g.triggered?`<span class="gap trig">⚠ 已触发</span>`:`<span class="gap">${arrow}${g.absPct.toFixed(1)}%</span>`):'';return `<span class="chip ${type}${trigCls}"><span>${type==='buy'?'▲':'▼'}</span><span class="price">${fmtMaybe(p.price)}</span><span class="shares">${fmtInt(p.shares)}</span>${gapHtml}${p.note?`<span>· ${esc(p.note)}</span>`:''}</span>`}).join('')}</div>`}

..payload,createdAt:Date.now()});currentTab=formType;saveState();closeModal();render()}

function getExecutionLogRows(stockName=logStockFilter){
  const logs=Array.isArray(state.executionLog)?state.executionLog:[];
  return logs
    .filter(x=>!stockName||x.stock===stockName)
    .slice()
    .sort((a,b)=>(Number(b.t)||0)-(Number(a.t)||0));
}
function executionLogAmount(x){
  const amount=Number(x.amount);
  if(!isNaN(amount)&&amount>0)return amount;
  const price=Number(x.price),shares=Number(x.shares);
  if(isNaN(price)||isNaN(shares))return null;
  return price*shares;
}
function executionLogTime(x){
  const t=Number(x.t);
  if(!t)return '—';
  return new Date(t).toLocaleString('zh-CN');
}
function executionLogAction(x){

}
function renderExecutionLog(){

<script>
function normalizeQuoteCode(code){
  return String(code||'').trim().toUpperCase();
}
function codeKind(code){
  const c=normalizeQuoteCode(code);
  if(/^\d{1,5}\.HK$/.test(c))return 'hk';
  if(/^\d{6}\.(SS|SZ)$/.test(c))return 'cn';
  if(/^[A-Z.]{1,10}$/.test(c))return 'us';
  return 'unknown';
}
function validateQuoteCode(code,type){
  const c=normalizeQuoteCode(code);
  if(!c)return {ok:false,reason:'缺少行情代码'};
  if(type==='etf'){
    if(/^(5\d{5}|1[568]\d{4})\.(SS|SZ)$/.test(c))return {ok:true,kind:'etf-cn'};
    if(/^\d{4,5}\.HK$/.test(c))return {ok:true,kind:'etf-hk'};
    return {ok:false,reason:'ETF 代码格式不正确：A股ETF请用 510300.SS / 159915.SZ，港股ETF请用 2800.HK。'};
  }
  if(/^\d{1,5}\.HK$/.test(c))return {ok:true,kind:'hk'};
  if(/^\d{6}\.SS$/.test(c)||/^\d{6}\.SZ$/.test(c))return {ok:true,kind:'cn'};
  if(/^[A-Z.]{1,10}$/.test(c))return {ok:true,kind:'us'};
  return {ok:false,reason:'行情代码格式不正确：港股如 1810.HK，A股如 601138.SS / 000001.SZ，ETF如 510300.SS。'};
}
function sourceErrorMessage(source,err){
  return `${source}: ${err&&err.message?err.message:err}`;
}
function formatSourceErrors(errors){
  if(!errors||!errors.length)return '无详细错误';
  return errors.map(x=>`- ${x}`).join('\n');
}
async function fetchJsonWithFallback(url){
  const endpoints=[
    {name:'直接请求',url},
    {name:'corsproxy.io',url:`https://corsproxy.io/?${encodeURIComponent(url)}`},
    {name:'codetabs',url:`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`},
    {name:'AllOrigins',url:`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`},
    {name:'thingproxy',url:`https://thingproxy.freeboard.io/fetch/${url}`}
  ];
  const errors=[];
  for(const ep of endpoints){
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000);
    try{
      const res=await fetch(ep.url,{cache:'no-store',signal:ctrl.signal});
      clearTimeout(timer);
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const txt=await res.text();
      let data;
      try{data=JSON.parse(txt)}catch(_){throw new Error('返回内容不是 JSON')}
      return {data,via:ep.name};
    }catch(err){
      clearTimeout(timer);
      const reason=err.name==='AbortError'?'超时':err.message;
      errors.push(`${ep.name}: ${reason}`);
    }
  }
  const e=new Error(`全部 ${endpoints.length} 个代理渠道均失败`);
  e.sourceErrors=errors;
  throw e;
}
function toEastMoneyCode(code){
  const clean=normalizeQuoteCode(code);
  if(!clean)return null;
  if(clean.endsWith('.SS'))return '1.'+clean.slice(0,-3);
  if(clean.endsWith('.SZ'))return '0.'+clean.slice(0,-3);
  if(clean.endsWith('.HK'))return '116.'+clean.slice(0,-3).padStart(5,'0');
  if(/^[A-Z]+$/.test(clean))return '105.'+clean;
  if(/^[56]/.test(clean))return '1.'+clean;
  if(/^(0|1|3|159|16)/.test(clean))return '0.'+clean;
  return null;
}
function extractEastMoneyPrice(data){
  if(!data||!data.data)return null;
  const d=data.data;
  let raw=d.f43;
  if(typeof raw!=='number'||raw<=0||isNaN(raw))raw=d.f60;
  if(typeof raw!=='number'||raw<=0||isNaN(raw))return null;
  const price=Number(raw.toFixed(4));
  const change=(typeof d.f170==='number'&&!isNaN(d.f170))?Number(d.f170.toFixed(2)):null;
  return {price,change};
}
function fetchEastMoneyViaJsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='emcb_'+Date.now()+'_'+Math.floor(Math.random()*10000);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject(new Error('JSONP 超时'))},8000);
    function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(_){window[cb]=undefined}if(script.parentNode)script.parentNode.removeChild(script)}
    window[cb]=(data)=>{cleanup();const r=extractEastMoneyPrice(data);if(r===null){const snip=JSON.stringify(data||{}).slice(0,250);console.warn('[东财] 响应解析失败:',data);reject(new Error('JSONP 无有效价格 | '+snip))}else{resolve(r)}};
    script.onerror=()=>{cleanup();reject(new Error('JSONP 脚本加载失败'))};
    script.src=url+'&cb='+cb;
    document.body.appendChild(script);
  });
}
async function fetchFromEastMoney(code){
  const emCode=toEastMoneyCode(code);
  if(!emCode)throw new Error('代码格式无法识别为东方财富 secid');
  const url=`https://push2.eastmoney.com/api/qt/stock/get?secid=${emCode}&fields=f43,f44,f45,f46,f47,f48,f57,f58,f60,f168,f170&fltt=2&invt=2&ut=fa5fd1943c7b386f172d6893dbfba10b`;
  const errors=[];
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),6000);
    const res=await fetch(url,{cache:'no-store',signal:ctrl.signal});
    clearTimeout(timer);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const r=extractEastMoneyPrice(data);
    if(r!==null)return {price:r.price,change:r.change,updatedAt:new Date().toISOString().slice(0,10),source:'东方财富·直连'};
    throw new Error('响应中没有有效价格');
  }catch(err){
    errors.push(sourceErrorMessage('东方财富直连',err));
  }
  try{
    const r=await fetchEastMoneyViaJsonp(url);
    return {price:r.price,change:r.change,updatedAt:new Date().toISOString().slice(0,10),source:'东方财富·JSONP'};
  }catch(err){
    errors.push(sourceErrorMessage('东方财富JSONP',err));
  }
  const e=new Error('东方财富全部通道失败');
  e.sourceErrors=errors;
  throw e;
}
async function fetchFromYahoo(code){
  const clean=normalizeQuoteCode(code);
  if(!clean)throw new Error('缺少行情代码');
  const yahooUrl=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(clean)}?interval=1d&range=1d`;
  try{
    const {data,via}=await fetchJsonWithFallback(yahooUrl);
    const result=data?.chart?.result?.[0];
    const meta=result?.meta||{};
    const quote=result?.indicators?.quote?.[0]||{};
    const closes=Array.isArray(quote.close)?quote.close.filter(v=>v!==null&&v!==undefined&&!isNaN(Number(v))):[];
    const price=meta.regularMarketPrice ?? closes[closes.length-1] ?? meta.previousClose;
    if(price===undefined||price===null||isNaN(Number(price)))throw new Error('未获取到有效价格');
    const prev=meta.chartPreviousClose ?? meta.previousClose;
    const change=(typeof prev==='number'&&typeof price==='number'&&prev>0)?Number(((price-prev)/prev*100).toFixed(2)):null;
    return {price:Number(price),change,updatedAt:new Date().toISOString().slice(0,10),source:`Yahoo·${via}`};
  }catch(err){
    if(err.sourceErrors)err.sourceErrors=err.sourceErrors.map(x=>`Yahoo ${x}`);
    throw err;
  }
}
async function fetchStockPrice(code,type){
  const valid=validateQuoteCode(code,type);
  if(!valid.ok){
    const e=new Error(valid.reason);
    e.sourceErrors=[`格式校验: ${valid.reason}`];
    throw e;
  }
  const errs=[];
  try{return await fetchFromEastMoney(code)}catch(e){errs.push(...(e.sourceErrors||[sourceErrorMessage('东方财富',e)]))}
  try{return await fetchFromYahoo(code)}catch(e){errs.push(...(e.sourceErrors||[sourceErrorMessage('Yahoo',e)]))}
  const err=new Error('所有数据源均失败');
  err.sourceErrors=errs;
  throw err;
}
async function refreshOnePrice(id,opts={}){
  const s=state.stocks.find(x=>x.id===id);
  if(!s)return {ok:false,name:'未知标的',errors:['标的不存在']};
  const isEtf=s.type==='etf';
  const fail=(msg,errors=[msg])=>{if(!opts.silent)alert(msg);return {ok:false,name:s.name,errors}};
  if(isCashRow(s))return fail(`「${s.name}」为现金台账，请通过「编辑」手动维护当前市值。`);
  if(!s.code)return fail(`请先给「${s.name}」填写行情代码。`);
  const valid=validateQuoteCode(s.code,s.type);
  if(!valid.ok)return fail(`${s.name} 行情代码校验失败：\n${valid.reason}`,[`格式校验: ${valid.reason}`]);
  if(isEtf){
    const shares=Number(s.shares);
    if(isNaN(shares)||shares<=0)return fail(`「${s.name}」没有填写份额，无法用单价计算市值。请先到编辑界面补充份额。`);
  }
  try{
    s.syncStatus='updating';saveState();render();
    const r=await fetchStockPrice(s.code,s.type);
    if(isEtf){
      const shares=Number(s.shares);
      s.currentValue=Number((r.price*shares).toFixed(2));
      s.valueUpdatedAt=r.updatedAt;
      s.priceSource=r.source;
      s.lastUnitPrice=r.price;
      s.dailyChange=r.change;
    }else{
      s.currentPrice=r.price;
      s.priceUpdatedAt=r.updatedAt;
      s.priceSource=r.source;
      s.dailyChange=r.change;
    }
    s.syncStatus='success';
    saveState();render();
    return {ok:true,name:s.name,source:r.source,price:r.price};
  }catch(err){
    const errors=err.sourceErrors||[err.message||String(err)];
    s.syncStatus='failed';s.lastSyncError=errors.join('\n');saveState();render();
    if(!opts.silent)alert(`${s.name} ${isEtf?'市值':'价格'}刷新失败，已保留原值。\n\n失败原因：\n${formatSourceErrors(errors)}`);
    return {ok:false,name:s.name,errors};
  }
}
function wait(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
async function fetchFxRate(silent){
  const btn=document.getElementById('fxBtn');
  if(btn)btn.textContent='汇率刷新中...';
  try{
    const r=await fetchFromYahoo('HKDCNY=X');
    const rate=Number(Number(r.price).toFixed(4));
    if(!(rate>0)||rate>2)throw new Error('返回汇率数值异常 '+r.price);
    state.fx={hkdcny:rate,updatedAt:r.updatedAt,source:r.source};
    saveState();render();
    return true;
  }catch(err){
    render();
    const errors=err.sourceErrors||[err.message||String(err)];
    if(!silent)alert('HKD→CNY 汇率联网获取失败，仍使用原汇率 '+fxHKD()+'。\n\n原因：\n'+formatSourceErrors(errors)+'\n\n可点击「汇率」按钮手动输入。');
    return false;
  }
}
async function onFxClick(){
  const f=state.fx||{};
  const input=prompt(`HKD→CNY 汇率\n当前：${fxHKD()}（${f.source||'默认'}${f.updatedAt?' · '+f.updatedAt:''}）\n\n· 输入新汇率后点确定 = 手动设置\n· 留空直接点确定 = 联网自动获取`,'');
  if(input===null)return;
  const t=String(input).trim();
  if(t===''){await fetchFxRate(false);return}
  const v=Number(t);
  if(isNaN(v)||v<=0||v>2)return alert('汇率数值不合理，请输入 0~2 之间的数字，例如 0.92。');
  state.fx={hkdcny:Number(v.toFixed(4)),updatedAt:new Date().toISOString().slice(0,10),source:'手动'};
  saveState();render();
}
async function refreshAllPrices(){
  const targets=state.stocks.filter(s=>s.code&&!isCashRow(s));
  if(!targets.length)return alert('没有可刷新的行情代码。');
  if(state.stocks.some(s=>getCurrency(s)==='HKD'))await fetchFxRate(true);
  const results=[];
  for(const s of targets){
    const r=await refreshOnePrice(s.id,{silent:true});
    results.push(r);
    await wait(500);
  }
  const ok=results.filter(r=>r.ok);
  const fail=results.filter(r=>!r.ok);
  const failedText=fail.length?'\n\n失败明细：\n'+fail.map(r=>`- ${r.name}: ${(r.errors||[]).join('；')}`).join('\n'):'';
  alert(`刷新完成：成功 ${ok.length} 个，失败 ${fail.length} 个。${failedText}`);
}
async function testQuoteCode(){
  const code=document.getElementById('fCode').value.trim();
  const type=formType;
  const valid=validateQuoteCode(code,type);
  if(!valid.ok)return alert('行情代码校验失败：\n'+valid.reason);
  try{
    const r=await fetchStockPrice(code,type);
    alert(`行情代码可用。\n\n代码：${normalizeQuoteCode(code)}\n来源：${r.source}\n价格：${r.price}\n日期：${r.updatedAt}`);
  }catch(err){
    alert(`行情代码格式通过，但测试获取失败。\n\n失败原因：\n${formatSourceErrors(err.sourceErrors||[err.message||String(err)])}`);
  }
}
