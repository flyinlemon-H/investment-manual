eft:16px}.social-review-block li{font-size:12px;line-height:1.55;color:var(--ink2);margin:2px 0}

<body><div class="wrap">
<header><div class="brand"><div class="seal">策</div><div><h1>投资作战手册 V9.2.2</h1><div class="sub">Thesis · Discipline · Action Plan</div></div></div><div class="date" id="dateStamp"></div></header>
<div class="tabs"><button class="tab active" data-tab="dashboard">总览</button><button class="tab" data-tab="holding">个股 <span id="countHolding" class="count">0</span></button><button class="tab" data-tab="etf">ETF <span id="countEtf" class="count">0</span></button><button class="tab" data-tab="watching">观察 <span id="countWatching" class="count">0</span></button></div>
<div class="toolbar"><div class="summary" id="summary">—</div><div class="actions"><button class="btn ghost small" id="fxBtn" title="点击设置或刷新 HKD→CNY 汇率">汇率 —</button><button class="btn ghost small" id="importBtn">导入JSON</button><button class="btn ghost small" id="exportBtn">导出</button><button class="btn ghost small" id="socialImportBtn">导入 social_posts.json</button><button class="btn ghost small" id="resetBtn">清空本地数据</button><button class="btn ghost small" id="refreshAllBtn">刷新全部价格</button><button class="btn" id="addBtn">＋ 新增标的</button><input type="file" id="importFile" accept=".json,application/json" style="display:none"><input type="file" id="socialImportFile" accept=".json,application/json" style="display:none"></div></div><div class="sync" id="syncHint"></div><div class="sync" id="socialDataStatus">社媒数据更新时间：—</div><div id="main"></div>
</div>
<div class="modal-bg" id="modal"><div class="modal"><h2 id="modalTitle">新增标的</h2><div class="modal-sub">只记录决策依据，不重复交易软件里的盈亏统计</div>
<div class="form-row"><label>类型</label><div class="type-toggle" id="typeToggle"><button data-type="holding">个股</button><button data-type="etf">ETF</button><button data-type="watching">观察</button></div></div>
<div class="form-row three"><div><label>名称</label><input id="fName" placeholder="例如：紫金矿业 / 沪深300ETF"></div><div><label>行情代码（联网价格，可选）</label><input id="fCode" placeholder="港股如 1810.HK；A股如 601138.SS"></div><div><label>计价货币</label><select id="fCurrency"><option value="">自动（按代码判断）</option><option value="CNY">CNY 人民币</option><option value="HKD">HKD 港币</option></select></div></div>
<div class="form-row three"><div><label>持仓股数/份额</label><input type="number" step="any" id="fShares"></div><div><label>成本价（可选）</label><input type="number" step="any" id="fCost"></div><div><label>目标仓位%</label><input type="number" step="any" id="fTarget"></div></div><div class="form-row three"><div><label>削减线%（占比≥即提醒）</label><input type="number" step="any" id="fTrim" placeholder="如 12"></div><div><label>削回至%</label><input type="number" step="any" id="fTrimTo" placeholder="如 10"></div><div><label>冻结线%（≥禁买）</label><input type="number" step="any" id="fCap" placeholder="如 13"></div></div>
<div class="form-row two"><div><label>个股当前价格</label><input type="number" step="any" id="fCurrentPrice" placeholder="个股/观察仓填写"></div><div><label>ETF当前市值</label><input type="number" step="any" id="fCurrentValue" placeholder="ETF填写"><div class="card-note">请按该 ETF 原始计价货币填写；港股 ETF 通常为 HKD。ETF 触发价按单位净值/单价判断，优先使用刷新得到的单位价格；没有单位价格时按当前市值 / 份额反推。</div></div></div>
<div class="form-row two"><div><label>仓位角色</label><select id="fRole"><option>核心仓</option><option>成长仓</option><option>卫星仓</option><option>观察仓</option><option>防御核心仓</option><option>现金</option></select></div><div><label>主题分类</label><select id="fTheme"><option>宽基指数</option><option>黄金资源</option><option>AI科技</option><option>消费</option><option>防御</option><option>现金</option><option>其他</option></select></div></div>
<div class="form-row"><label>为什么持有 / 建仓逻辑</label><textarea id="fThesis" placeholder="买它的理由、核心变量、未来要跟踪什么"></textarea></div>
<div class="form-row"><label>什么情况下卖出 / 降仓</label><textarea id="fSellRule" placeholder="逻辑破坏、估值过热、仓位超标、到达止盈区间等"></textarea></div>
<div class="form-row"><label>补充纪律 / 备注</label><textarea id="fNotes" placeholder="不为解套补仓、只做再平衡、观察仓不升级等"></textarea></div>
<div class="form-row"><label>加仓 / 建仓动作</label><div class="plan-editor"><table class="plan-table"><thead><tr><th>触发价格</th><th>数量</th><th>动作备注</th><th></th></tr></thead><tbody id="buyRows"></tbody></table><button class="link-btn" id="addBuy" type="button">＋ 添加一档</button></div></div>
<div class="form-row" id="sellBox"><label>减仓 / 止盈动作</label><div class="plan-editor"><table class="plan-table"><thead><tr><th>触发价格</th><th>数量</th><th>动作备注</th><th></th></tr></thead><tbody id="sellRows"></tbody></table><button class="link-btn" id="addSell" type="button">＋ 添加一档</button></div></div>
<div class="modal-actions"><button class="btn ghost" id="testCodeBtn" type="button">测试行情代码</button><button class="btn ghost" id="cancelBtn">取消</button><button class="btn" id="saveBtn">保存</button></div></div></div>
<script>
const STORAGE_KEY='portfolio_manual_v502_network_price_20260610';

const seedStocks=[];

let state={stocks:[],updatedAt:null},currentTab='dashboard',editingId=null,detailStockId=null,formType='holding',tempBuy=[],tempSell=[];
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=(n,d=2)=>Number(n||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});

function valuationMetricSignal(label,current,low,mid,high){
  const warnings=[];
  if(!(current>0)||!(low>0)||!(mid>0)||!(high>0)||!(low<=mid&&mid<=high)){
    warnings.push(`${label} 数据或历史区间不足，无法自动评分`);
    return {score:0,summary:'',signals:[],warnings};
  }
  if(current<=low)return {score:9,summary:`当前 ${label} 低于历史低位，估值处于低估区间`,signals:[`${label} ${current} <= 历史低位 ${low}`],warnings};
  if(current<=mid)return {score:8,summary:`当前 ${label} 低于历史中位数，估值处于合理偏低区间`,signals:[`${label} ${current} <= 历史中位数 ${mid}`],warnings};
  if(current<=high)return {score:6,summary:`当前 ${label} 低于历史高位，估值处于合理偏高区间`,signals:[`${label} ${current} <= 历史高位 ${high}`],warnings};
  return {score:4,summary:`当前 ${label} 高于历史高位，估值偏贵`,signals:[],warnings:[`${label} ${current} > 历史高位 ${high}`]};
}
function calculateValuationSignal(stock){

  let used='PE';
  let base=valuationMetricSignal('PE',vd.pe,vd.historicalPeLow,vd.historicalPeMid,vd.historicalPeHigh);
  allWarnings.push(...base.warnings);
  if(!base.score){
    used='PB';
    base=valuationMetricSignal('PB',vd.pb,vd.historicalPbLow,vd.historicalPbMid,vd.historicalPbHigh);
    allWarnings.push(...base.warnings);
  }
  if(!base.score){
    used='PS';
    base=valuationMetricSignal('PS',vd.ps,vd.historicalPsLow,vd.historicalPsMid,vd.historicalPsHigh);
    allWarnings.push(...base.warnings);
  }
  let valuationScore=base.score||0;
  const signals=[...base.signals];
  const warnings=base.score?[...base.warnings]:allWarnings;
  if(valuationScore>0){
    if(vd.profitGrowth>=30){valuationScore+=1;signals.push(`利润增速 ${vd.profitGrowth}% >= 30%，估值评分上调`)}
    if(vd.revenueGrowth>=30){valuationScore+=.5;signals.push(`收入增速 ${vd.revenueGrowth}% >= 30%，估值评分小幅上调`)}
    if(vd.profitGrowth<0){valuationScore-=1;warnings.push(`利润增速 ${vd.profitGrowth}% < 0，估值评分下调`)}
    if(vd.revenueGrowth<0){valuationScore-=.5;warnings.push(`收入增速 ${vd.revenueGrowth}% < 0，估值评分小幅下调`)}
    if(vd.dividendYield>0)signals.push(`股息率 ${vd.dividendYield}%`);
    if(vd.valuationNote)signals.push(`人工备注：${vd.valuationNote}`);
  }
  valuationScore=Number(normalizeAnalysisScoreValue(valuationScore).toFixed(1));
  const valuationStatus=valuationScore>=7.5?'positive':(valuationScore>=5?'neutral':'negative');
  const valuationSummary=valuationScore>0?base.summary:'缺少估值数据，无法自动判断。';
  if(!valuationScore&&!warnings.length)warnings.push('缺少估值数据，无法自动判断');
  return {valuationScore,valuationStatus,valuationSummary,signals,warnings,usedMetric:valuationScore>0?used:''};
}

function normalizePriceDate(value){
  const s=String(value||'').trim();
  if(!s)return '';
  let m=s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/);
  if(m){
    const d=new Date(Date.UTC(Number(m[1]),Number(m[2])-1,Number(m[3])));
    if(d.getUTCFullYear()===Number(m[1])&&d.getUTCMonth()===Number(m[2])-1&&d.getUTCDate()===Number(m[3]))return d.toISOString().slice(0,10);
  }
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    const a=Number(m[1]),b=Number(m[2]),y=Number(m[3]);
    const month=a>12?b:a;
    const day=a>12?a:b;
    const d=new Date(Date.UTC(y,month-1,day));
    if(d.getUTCFullYear()===y&&d.getUTCMonth()===month-1&&d.getUTCDate()===day)return d.toISOString().slice(0,10);
  }
  m=s.match(/^([A-Za-z]{3,9})\s+(\d{1,2}),\s*(\d{4})$/);
  if(m){
    const months={jan:0,january:0,feb:1,february:1,mar:2,march:2,apr:3,april:3,may:4,jun:5,june:5,jul:6,july:6,aug:7,august:7,sep:8,sept:8,september:8,oct:9,october:9,nov:10,november:10,dec:11,december:11};
    const month=months[m[1].toLowerCase()];
    const day=Number(m[2]),y=Number(m[3]);
    if(month!==undefined){
      const d=new Date(Date.UTC(y,month,day));
      if(d.getUTCFullYear()===y&&d.getUTCMonth()===month&&d.getUTCDate()===day)return d.toISOString().slice(0,10);
    }
  }
  const t=Date.parse(s);
  if(isFinite(t))return new Date(t).toISOString().slice(0,10);
  return '';
}
function normalizeClosePrice(value){
  const n=Number(String(value??'').replace(/,/g,'').trim());
  return isFinite(n)&&n>0?n:0;
}
function normalizePriceHistory(stockOrHistory){
  const raw=Array.isArray(stockOrHistory)?stockOrHistory:(stockOrHistory&&Array.isArray(stockOrHistory.priceHistory)?stockOrHistory.priceHistory:[]);
  const byDate=new Map();
  raw.forEach(row=>{
    const date=normalizePriceDate(row&&row.date);
    const close=normalizeClosePrice(row&&row.close);
    if(date&&close>0)byDate.set(date,{date,close});
  });
  return Array.from(byDate.values()).sort((a,b)=>a.date.localeCompare(b.date));
}
function calculateMovingAverage(priceHistory,window){
  const history=normalizePriceHistory(priceHistory);
  const n=Math.max(1,Math.floor(Number(window)||0));
  const warnings=[];
  if(history.length<n){
    warnings.push(`历史价格不足 ${n} 条，无法计算 MA${n}`);
    return {value:0,warnings};
  }
  const slice=history.slice(-n);
  const value=slice.reduce((sum,x)=>sum+x.close,0)/n;
  return {value:Number(value.toFixed(4)),warnings};
}
function calculateSupportResistance(priceHistory){
  const history=normalizePriceHistory(priceHistory);
  const warnings=[];
  if(history.length<20){
    warnings.push('历史价格不足 20 条，无法计算支撑位/压力位');
    return {supportPrice:0,resistancePrice:0,warnings};
  }
  const slice=history.slice(-60);
  const lows=slice.map(x=>x.close);
  return {supportPrice:Number(Math.min(...lows).toFixed(4)),resistancePrice:Number(Math.max(...lows).toFixed(4)),warnings};
}

function daysSinceDate(value){

}

function calculateDecision(stock,portfolioContext={}){

  const total=Number(portfolioContext.totalMarketValue)||0;
  const mv=Number(s.marketValue||s.currentValue)||((Number(s.currentPrice)>0&&Number(s.shares)>0)?Number(s.currentPrice)*Number(s.shares):0);
  const currentWeight=total>0?mv/total*100:0;
  const explicitTargetWeight=Number(strategy.targetWeight)||0;
  const targetSharesForWeight=Number(strategy.targetShares)||0;
  const derivedTargetWeight=(targetSharesForWeight>0&&stockCurrentPrice(s)>0&&total>0)?targetSharesForWeight*stockCurrentPrice(s)/total*100:0;
  const targetWeight=explicitTargetWeight>0?explicitTargetWeight:derivedTargetWeight;
  const maxWeight=Number(strategy.maxWeight)||0;
  const positionGap=targetWeight-currentWeight;
  const positionGapScore=calculatePositionGapScore(targetWeight,positionGap);
  const analysisScore=normalizeAnalysisScoreValue(s.analysisScore);
  const valuationScore=normalizeAnalysisScoreValue(fw.valuation.score);
  const technicalScore=normalizeAnalysisScoreValue(fw.technical.score);
  const risksScore=normalizeAnalysisScoreValue(fw.risks.score);

  if(technicalScore<=4)warnings.push('技术趋势偏弱');
  if(valuationScore<=3&&technicalScore<=4)action=capDecisionAction(action,'hold');
  if(maxWeight>0&&currentWeight>=maxWeight){warnings.push('仓位超过最大仓位');action=capDecisionAction(action,'hold')}
  if(targetWeight<=0)warnings.push('未设置目标仓位');

  const reasons=[

    `技术评分 ${technicalScore.toFixed(1)}/10`,
    `风险评分 ${risksScore.toFixed(1)}/10`,
    `当前仓位 ${currentWeight.toFixed(1)}%，目标仓位 ${targetWeight.toFixed(1)}%，差距 ${positionGap.toFixed(1)}%`

  const total=Number(portfolioContext.totalMarketValue)||0;
  const minTradeUnit=strategy.minTradeUnit;
  const targetShares=Number(strategy.targetShares)||0;
  let remainingTargetShares=0;
  let remainingTargetValue=0;
  if(targetShares>0){
    remainingTargetShares=Math.max(0,targetShares-currentShares);
    remainingTargetValue=currentPrice>0?remainingTargetShares*currentPrice:0;
  }else{
    const targetValue=total*(Number(strategy.targetWeight)||0)/100;
    const currentValue=currentPrice>0?currentShares*currentPrice:(Number(s.marketValue||s.currentValue)||0);
    remainingTargetValue=Math.max(0,targetValue-currentValue);
    remainingTargetShares=currentPrice>0?Math.max(0,Math.floor(remainingTargetValue/currentPrice)):0;
  }
  let suggestedBuyAmount=0;
  const canBuy=decision.action==='strongBuy'||decision.action==='buy';
  if(canBuy&&remainingTargetValue>0){
    suggestedBuyAmount=Number(strategy.preferredBuyAmount)||0;
    suggestedBuyAmount=suggestedBuyAmount>0?(decision.action==='strongBuy'?suggestedBuyAmount*1.5:suggestedBuyAmount):remainingTargetValue*.2;
    const mult={conservative:.6,normal:1,aggressive:1.3}[strategy.buyAggressiveness]||1;
    suggestedBuyAmount*=mult;
    if(strategy.maxSingleBuyAmount>0)suggestedBuyAmount=Math.min(suggestedBuyAmount,strategy.maxSingleBuyAmount);
    suggestedBuyAmount=Math.min(suggestedBuyAmount,remainingTargetValue);
  }
  let suggestedShares=0;
  if(currentPrice>0&&suggestedBuyAmount>0){
    suggestedShares=roundDownToUnit(suggestedBuyAmount/currentPrice,minTradeUnit);
    if(targetShares>0)suggestedShares=Math.min(suggestedShares,roundDownToUnit(remainingTargetShares,minTradeUnit));

  let priceTiming='当前以持有为主，暂不主动加仓';
  if(currentPrice<=0){executionStatus='noData';priceTiming='缺少当前价格，无法计算买入股数'}
  else if(decision.action==='reduce'){executionStatus='reduceRisk';priceTiming='当前仓位或风险偏高，应优先控制风险'}
  else if(decision.action==='observe'){executionStatus='wait';priceTiming='当前更适合观察，等待更好的价格或趋势确认'}
  else if(decision.action==='hold'){executionStatus='hold';priceTiming='当前以持有为主，暂不主动加仓'}
  else if(canBuy&&suggestedShares>0){executionStatus='buyNow';priceTiming='当前决策支持买入，可按计划分批执行'}
  else if(canBuy){executionStatus='wait';priceTiming='决策支持买入，但金额不足最小交易单位，等待资金或价格变化'}
  const executionReasons=[
    `决策动作：${decisionActionLabel(decision.action)}`,
    `剩余目标市值 ${remainingTargetValue.toFixed(0)}`,
    `最小交易单位 ${minTradeUnit} 股`,
    targetShares>0?`目标股数 ${targetShares}，剩余 ${remainingTargetShares} 股`:`目标仓位 ${strategy.targetWeight}%`
  ];
  const executionWarnings=[];
  if(currentPrice<=0)executionWarnings.push('缺少当前价格');
  if(!canBuy)executionWarnings.push('当前决策不支持主动买入');
  if(canBuy&&suggestedShares===0)executionWarnings.push('建议金额不足最小交易单位');
  if(remainingTargetValue<=0)executionWarnings.push('已达到或超过目标仓位/股数');
  if(strategy.maxSingleBuyAmount>0&&suggestedBuyAmount>=strategy.maxSingleBuyAmount)executionWarnings.push('受单次最大买入金额限制');
  return {
    suggestedBuyAmount:Number(suggestedBuyAmount.toFixed(2)),
    suggestedShares:Number(suggestedShares)||0,
    remainingTargetShares:Number(remainingTargetShares.toFixed(2)),
    remainingTargetValue:Number(remainingTargetValue.toFixed(2)),
    executionStatus,
    priceTiming,
    executionReasons,
    executionWarnings
  };

<script>
let social_posts=[];
let social_summary=[];
let socialPosts=social_posts;
let socialSummary=social_summary;
let socialPostsLoaded=false;
let socialSummaryLoaded=false;
let socialDataUpdatedAt='';

const SOCIAL_ALIASES={
  '1810.HK':['1810','小米','小米集团','小米集团-W'],
  '601138.SS':['601138','工业富联','富士康工业互联网','FII'],
  '6869.HK':['6869','长飞光纤','长飞光纤光缆'],
  '2899.HK':['2899','紫金','紫金矿业'],
  '1357.HK':['1357','美图','美图公司'],
  '605499.SS':['605499','东鹏','东鹏饮料'],
  '603296.SS':['603296','华勤','华勤技术']
};

function normalizeText(v){return String(v||'').trim()}
function normalizeCode(v){return normalizeText(v).toUpperCase()}
function stripSuffix(v){return normalizeCode(v).replace(/\.(HK|SS|SZ)$/,'').replace(/^0+/,'')}
function uniqueNonEmpty(arr){return [...new Set(arr.map(x=>normalizeText(x)).filter(Boolean))]}
function normalizeSentiment(v){
  const s=normalizeText(v).toLowerCase();
  if(['bullish','positive','pos','利多','看多'].includes(s))return 'positive';
  if(['bearish','negative','neg','利空','看空'].includes(s))return 'negative';
  return 'neutral';
}
function sentimentWord(score,count){
  if(!count)return '暂无';
  if(score>=0.35)return '偏利多';
  if(score<=-0.35)return '偏利空';
  if(score>0)return '略偏利多';
  if(score<0)return '略偏利空';
  return '中性/分歧';
}
function normalizeSocialPost(p){
  const tags=Array.isArray(p.tags)?p.tags:[];
  const matched_keywords=Array.isArray(p.matched_keywords)?p.matched_keywords:[];
  const aliases=Array.isArray(p.aliases)?p.aliases:(Array.isArray(p.alias)?p.alias:[]);
  return {
    platform:normalizeText(p.platform),
    symbol:normalizeText(p.symbol||p.code),
    company:normalizeText(p.company||p.name),
    post_time:normalizeText(p.post_time||p.time||p.created_at),
    content:normalizeText(p.content||p.text),
    url:normalizeText(p.url),
    likes:Number(p.likes)||0,
    comments:Number(p.comments)||0,
    sentiment:normalizeSentiment(p.sentiment),
    tags:uniqueNonEmpty(tags),
    matched_keywords:uniqueNonEmpty(matched_keywords),
    aliases:uniqueNonEmpty(aliases),
    summary:normalizeText(p.summary),
    risk_points:Array.isArray(p.risk_points)?p.risk_points.map(String):[]
  };
}
function normalizeTopic(t){
  if(typeof t==='string')return {keyword:t,count:1};
  return {keyword:normalizeText(t.keyword||t.word||t.name),count:Number(t.count||t.value)||0};
}
function normalizeSocialSummary(x){
  const topics=x.hot_keywords||x.hot_topics||[];
  const aliases=Array.isArray(x.aliases)?x.aliases:(Array.isArray(x.alias)?x.alias:[]);
  const updated=normalizeText(x.updated_at||x.update_time||x.generated_at||x.date);
  return {
    symbol:normalizeText(x.symbol||x.code),
    company:normalizeText(x.company||x.name),
    aliases:uniqueNonEmpty(aliases),
    today_heat:Number(x.today_heat||x.heat||x.hotness||x.post_count)||0,
    post_count:Number(x.post_count||x.count)||0,
    sentiment_score:Number(x.sentiment_score||x.score)||0,
    hot_keywords:(Array.isArray(topics)?topics:[]).map(normalizeTopic).filter(t=>t.keyword),
    updated_at:updated,
    summary:normalizeText(x.summary),
    ai_brief:normalizeText(x.ai_brief),
    bullish_points:Array.isArray(x.bullish_points)?x.bullish_points.map(String):[],
    bearish_points:Array.isArray(x.bearish_points)?x.bearish_points.map(String):[],
    risk_points:Array.isArray(x.risk_points)?x.risk_points.map(String):[],
    review_flags:Array.isArray(x.review_flags)?x.review_flags.map(String):[]
  };
}
function setSocialPosts(data){
  const arr=Array.isArray(data)?data:(Array.isArray(data&&data.social_posts)?data.social_posts:[]);
  social_posts=arr.map(normalizeSocialPost);
  socialPosts=social_posts;
  socialPostsLoaded=true;
  if(!socialDataUpdatedAt)socialDataUpdatedAt=new Date().toISOString();
}
function setSocialSummary(data){
  const arr=Array.isArray(data)?data:(Array.isArray(data&&data.social_summary)?data.social_summary:[]);
  social_summary=arr.map(normalizeSocialSummary);
  socialSummary=social_summary;
  socialSummaryLoaded=true;
  const latest=social_summary.map(x=>x.updated_at).filter(Boolean).sort().pop();
  if(latest)socialDataUpdatedAt=latest;
}
async function loadJsonFile(file){
  const res=await fetch(file,{cache:'no-store'});
  if(!res.ok)throw new Error(file+' '+res.status);
  return res.json();
}
async function loadSocialPosts(){
  await Promise.all([
    loadJsonFile('social_posts.json').then(setSocialPosts).catch(e=>{setSocialPosts(window.SOCIAL_POSTS||[]);console.warn('social_posts.json 未加载，使用内置数据。',e)}),
    loadJsonFile('social_summary.json').then(setSocialSummary).catch(e=>{setSocialSummary(window.SOCIAL_SUMMARY||[]);console.warn('social_summary.json 未加载，将用帖子临时聚合。',e)})
  ]);
  updateSocialDataStatus();
}
function stockSocialKeys(s){
  const code=normalizeCode(s.code);
  const id=normalizeCode(s.id);
  const name=normalizeText(s.name);
  const noSuffix=stripSuffix(code);
  const aliases=Array.isArray(s.aliases)?s.aliases:(Array.isArray(s.alias)?s.alias:[]);
  const mapped=[...(SOCIAL_ALIASES[code]||[]),...(SOCIAL_ALIASES[id]||[])];
  return uniqueNonEmpty([code,noSuffix,id,name,...aliases,...mapped]).flatMap(x=>[x,normalizeCode(x),stripSuffix(x)]).filter(Boolean);
}
function itemSocialKeys(x){
  return uniqueNonEmpty([
    x.symbol,
    stripSuffix(x.symbol),
    x.company,
    ...(x.aliases||[]),
    ...(x.tags||[]),
    ...(x.matched_keywords||[]),
    ...(x.hot_keywords||[]).map(t=>t.keyword)
  ]).flatMap(v=>[v,normalizeCode(v),stripSuffix(v)]).filter(Boolean);
}
function matchesStockSocial(s,x){
  const keys=stockSocialKeys(s);
  const itemKeys=itemSocialKeys(x);
  if(keys.some(k=>itemKeys.includes(k)))return true;
  const stockName=normalizeText(s.name);
  const company=normalizeText(x.company);
  if(stockName&&company&&(stockName.includes(company)||company.includes(stockName)))return true;
  const haystack=[company,x.summary,x.content,...(x.tags||[]),...(x.aliases||[])].join(' ');
  // TODO(V6.6): use token-boundary matching for ASCII stock codes to reduce false positives.
  return keys.some(k=>k.length>=2&&haystack.includes(k));
}
function socialPostsForStock(s){return socialPosts.filter(p=>matchesStockSocial(s,p))}
function socialSummaryForStock(s){return socialSummary.find(x=>matchesStockSocial(s,x))||null}
function socialTodayKey(){return new Date().toISOString().slice(0,10)}
function socialPostScore(p){return (Number(p.likes)||0)+(Number(p.comments)||0)*2}
function aggregateSocialSummary(s){
  const posts=socialPostsForStock(s);
  const today=socialTodayKey();
  const todayPosts=posts.filter(p=>String(p.post_time||'').slice(0,10)===today);
  const source=todayPosts.length?todayPosts:posts;
  const scoreRaw=posts.reduce((sum,p)=>sum+(p.sentiment==='positive'?1:p.sentiment==='negative'?-1:0),0);
  const sentiment_score=posts.length?Number((scoreRaw/posts.length).toFixed(2)):0;
  const topicMap={};
  posts.flatMap(p=>(p.tags&&p.tags.length)?p.tags:(p.matched_keywords||[])).forEach(t=>{topicMap[t]=(topicMap[t]||0)+1});
  const hot_keywords=Object.keys(topicMap).sort((a,b)=>topicMap[b]-topicMap[a]).map(k=>({keyword:k,count:topicMap[k]}));
  const updated_at=posts.map(p=>p.post_time).filter(Boolean).sort().pop()||socialDataUpdatedAt||'';
  const bullish_points=socialPointList(posts,'positive',3);
  const bearish_points=socialPointList(posts,'negative',3);
  const risk_points=socialRiskList(posts,4);
  const review_flags=socialReviewFlags({post_count:posts.length,sentiment_score,risk_points,bullish_points,bearish_points});
  return {today_heat:source.reduce((sum,p)=>sum+socialPostScore(p),0),post_count:posts.length,sentiment_score,hot_keywords,updated_at,summary:'',ai_brief:socialAiBrief(s,posts.length,sentiment_score,bullish_points,bearish_points),bullish_points,bearish_points,risk_points,review_flags,_fromPosts:true};
}
function socialMetricForStock(s){
  const summary=socialSummaryForStock(s);
  return summary||aggregateSocialSummary(s);
}
function socialUpdatedLabel(value){
  if(!value)return '—';
  const d=new Date(value);
  return isNaN(d.getTime())?value:d.toLocaleString('zh-CN');
}
function socialHotTopicsHtml(topics){
  if(!topics||!topics.length)return '<span class="muted">暂无</span>';
  return `<div class="social-tags">${topics.slice(0,6).map(t=>`<span class="social-tag">${esc(t.keyword)}${t.count?` ×${fmtInt(t.count)}`:''}</span>`).join('')}</div>`;
}
function socialSentimentLabelFromMetric(m){
  return sentimentWord(Number(m.sentiment_score)||0,Number(m.post_count)||0);
}
function socialPointList(posts,sentiment,limit){
  const items=posts.filter(p=>p.sentiment===sentiment).sort((a,b)=>socialPostScore(b)-socialPostScore(a)).map(p=>p.summary||p.content).filter(Boolean);
  return [...new Set(items)].slice(0,limit);
}
function socialRiskList(posts,limit){
  return [...new Set(posts.flatMap(p=>p.risk_points||[]).filter(Boolean))].slice(0,limit);
}
const SOCIAL_REVIEW_FLAG_LABELS={
  high_heat:'热度明显升高',
  sentiment_divergence:'多空分歧',
  negative_risk:'负面风险集中',
  price_action_check:'需要结合价格走势复核',
  position_size_check:'需要结合仓位复核'
};
function socialReviewFlags(metric){
  const flags=[];
  const postCount=Number(metric.post_count)||0;
  const score=Number(metric.sentiment_score)||0;
  const hasBull=(metric.bullish_points||[]).length>0;
  const hasBear=(metric.bearish_points||[]).length>0;
  if(postCount>=5)flags.push('high_heat');
  if(postCount>=4&&hasBull&&hasBear&&Math.abs(score)<=0.35)flags.push('sentiment_divergence');
  if((metric.risk_points||[]).length)flags.push('negative_risk');
  if(postCount){flags.push('price_action_check');flags.push('position_size_check');}
  return flags;
}
function socialAiBrief(stock,postCount,score,bullishPoints,bearishPoints){
  const name=normalizeText(stock&&stock.name)||'该标的';
  if(!postCount)return `${name} 暂无可聚合舆情，需等待更多数据。`;
  let tone='舆情整体中性';
  if(score>=0.35)tone='舆情暂偏利多';
  else if(score<=-0.35)tone='舆情暂偏利空';
  else if(postCount>=4&&bullishPoints.length&&bearishPoints.length)tone='多空观点分歧较大';
  return `${name} 近端共 ${fmtInt(postCount)} 条社媒/新闻记录，${tone}，仅用于投资复核。`;
}
function socialEnsureReviewMetric(metric,stock,posts){
  const m=Object.assign({},metric);
  if(!m.bullish_points||!m.bullish_points.length)m.bullish_points=socialPointList(posts,'positive',3);
  if(!m.bearish_points||!m.bearish_points.length)m.bearish_points=socialPointList(posts,'negative',3);
  if(!m.risk_points||!m.risk_points.length)m.risk_points=socialRiskList(posts,4);
  if(!m.review_flags||!m.review_flags.length)m.review_flags=socialReviewFlags(m);
  if(!m.ai_brief)m.ai_brief=socialAiBrief(stock,Number(m.post_count||posts.length)||0,Number(m.sentiment_score)||0,m.bullish_points,m.bearish_points);
  return m;
}
function socialPointListHtml(title,items,cls){
  if(!items||!items.length)return '';
  return `<div class="social-review-block ${cls||''}"><div class="social-label">${esc(title)}</div><ul>${items.slice(0,4).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;
}
function socialReviewPanelHtml(metric){
  const flags=metric.review_flags||[];
  const flagHtml=flags.length?`<div class="social-tags">${flags.map(f=>`<span class="social-tag">${esc(SOCIAL_REVIEW_FLAG_LABELS[f]||f)}</span>`).join('')}</div>`:'<span class="muted">暂无复核标签</span>';
  return `<div class="social-review"><div class="card-title">投资复核提示</div>${metric.ai_brief?`<div class="hint">${esc(metric.ai_brief)}</div>`:''}<div class="social-review-note">仅作信息复核，不构成买卖指令</div>${flagHtml}<div class="social-review-grid">${socialPointListHtml('利多观点',metric.bullish_points,'bullish')}${socialPointListHtml('利空观点',metric.bearish_points,'bearish')}${socialPointListHtml('风险点',metric.risk_points,'risk')}</div></div>`;
}
function socialTagsHtml(tags){
  if(!tags||!tags.length)return '';
  return `<div class="social-tags">${tags.slice(0,6).map(t=>`<span class="social-tag">${esc(t)}</span>`).join('')}</div>`;
}
function socialDisplayTags(p){
  return (p.tags&&p.tags.length)?p.tags:(p.matched_keywords||[]);
}
function socialRecentPostsHtml(posts){
  const recent=posts.slice().sort((a,b)=>String(b.post_time||'').localeCompare(String(a.post_time||''))).slice(0,5);
  if(!recent.length)return '<div class="social-empty">暂无代表性帖子</div>';
  return `<div class="social-list">${recent.map(p=>`<div class="social-post"><div class="social-post-head"><span>${esc(p.platform||'社媒')} · ${esc(p.post_time||'')}</span><span>${fmtInt(p.likes)}赞 / ${fmtInt(p.comments)}评</span></div><div>${esc(p.summary||p.content)}</div>${p.url?`<div><a href="${esc(p.url)}" target="_blank" rel="noopener">原帖链接</a></div>`:''}${socialTagsHtml(socialDisplayTags(p))}${p.risk_points.length?`<div class="social-risk">${p.risk_points.map(esc).join('；')}</div>`:''}</div>`).join('')}</div>`;
}
function socialDetailPanel(s){
  const posts=socialPostsForStock(s);
  const metric=socialEnsureReviewMetric(socialMetricForStock(s),s,posts);
  const loaded=socialPostsLoaded||socialSummaryLoaded;
  if(!loaded)return '<details class="social-panel"><summary>社媒舆情 · 加载中</summary><div class="social-empty">社媒数据加载中...</div></details>';
  if(!metric.post_count&&!posts.length)return '<details class="social-panel"><summary>社媒舆情</summary><div class="social-empty">暂无匹配社媒数据</div></details>';
  const sentiment=socialSentimentLabelFromMetric(metric);
  return `<details class="social-panel"><summary>社媒舆情 · ${fmtInt(metric.post_count||posts.length)} 条 · ${esc(sentiment)}</summary><div class="social-grid"><div class="social-metric"><div class="social-label">今日热度</div><div class="social-value">${fmtInt(metric.today_heat)}</div></div><div class="social-metric"><div class="social-label">情绪分数</div><div class="social-value">${Number(metric.sentiment_score||0).toFixed(2)} · ${esc(sentiment)}</div></div><div class="social-metric"><div class="social-label">热门关键词</div><div class="social-value">${socialHotTopicsHtml(metric.hot_keywords)}</div></div><div class="social-metric"><div class="social-label">更新时间</div><div class="social-value">${esc(socialUpdatedLabel(metric.updated_at))}</div></div></div>${metric.summary?`<div class="hint">${esc(metric.summary)}</div>`:''}${socialReviewPanelHtml(metric)}<div class="card-title">最近代表性帖子</div>${socialRecentPostsHtml(posts)}</details>`;
}
function socialPanel(s){
  if(s.type==='etf')return '';
  const posts=socialPostsForStock(s);
  const metric=socialEnsureReviewMetric(socialMetricForStock(s),s,posts);
  const loaded=socialPostsLoaded||socialSummaryLoaded;
  const sentiment=socialSentimentLabelFromMetric(metric);
  const empty=loaded&&!metric.post_count&&!posts.length?'<div class="social-empty">暂无匹配的本地社媒数据。可通过“导入 social_posts.json”加载本地帖子。</div>':'';
  return `<tr class="social-row"><td class="social-cell" colspan="10"><details class="social-panel"><summary>社媒舆情 · ${fmtInt(metric.post_count||posts.length)} 条 · ${esc(sentiment)}</summary>${!loaded?'<div class="social-empty">社媒数据加载中...</div>':''}${empty}${loaded&&metric.post_count||posts.length?`<div class="social-grid"><div class="social-metric"><div class="social-label">今日热度</div><div class="social-value">${fmtInt(metric.today_heat)}</div></div><div class="social-metric"><div class="social-label">情绪分数</div><div class="social-value">${Number(metric.sentiment_score||0).toFixed(2)}</div></div><div class="social-metric"><div class="social-label">热门关键词</div><div class="social-value">${socialHotTopicsHtml(metric.hot_keywords)}</div></div><div class="social-metric"><div class="social-label">更新时间</div><div class="social-value">${esc(socialUpdatedLabel(metric.updated_at))}</div></div></div>${socialReviewPanelHtml(metric)}${socialRecentPostsHtml(posts)}`:''}</details></td></tr>`;
}
function updateSocialDataStatus(){
  const el=document.getElementById('socialDataStatus');
  if(!el)return;
  const summaryTimes=socialSummary.map(x=>x.updated_at).filter(Boolean);
  const postTimes=socialPosts.map(x=>x.post_time).filter(Boolean);
  const latest=[...summaryTimes,...postTimes,socialDataUpdatedAt].filter(Boolean).sort().pop();
  el.textContent='社媒数据更新时间：'+socialUpdatedLabel(latest);
}
function importSocialData(){document.getElementById('socialImportFile').click()}
function handleSocialImport(e){
  const file=e.target.files[0];
  if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      setSocialPosts(parsed);
      socialDataUpdatedAt=new Date().toISOString();
      const today=todayDate();
      state.stocks.forEach(s=>{
        const matched=socialPostsForStock(s);
        if(matched.length)touchDataFreshness(s,'socialUpdatedAt',today);
        if(matched.some(p=>String(p.platform||'').toLowerCase()==='news'))touchDataFreshness(s,'newsUpdatedAt',today);
      });
      saveState();
      updateSocialDataStatus();
      render();
      alert(`社媒数据导入成功：${socialPosts.length} 条帖子。`);
    }catch(err){
      alert('社媒数据导入失败：'+err.message);
    }
  };
  r.readAsText(file);
  e.target.value='';
}

<script>
let logStockFilter='';
let analysisSortMode='score_desc';
let analysisRoleFilter='';
let analysisStatusFilter='';
let analysisRiskFilter='';
let analysisScoreFilter='';
let analysisActionFilter='';
let analysisCapitalFilter='';
let analysisExecutionFilter='';
let analysisFreshnessFilter='';
let analysisTechnicalStatusFilter='';
let analysisValuationStatusFilter='';
let analysisValuationMissingFilter='';
let analysisFinancialStatusFilter='';
let analysisFinancialMissingFilter='';
function backupReminderText(){
  const t=Number(state.lastBackupAt);
  if(!t)return ' · 建议导出备份';
  const days=Math.floor((Date.now()-t)/86400000);
  return days>7?` · 建议导出备份（上次 ${days} 天前）`:'';
}
function isDefaultFx(){const f=(state&&state.fx)||{};return !f.updatedAt||f.source==='默认'}
function priceReferenceDate(s){const f=normalizeDataFreshness(s.dataFreshness);return f.priceUpdatedAt||(s.type==='etf'?s.valueUpdatedAt:s.priceUpdatedAt)||''}
function priceRiskWarnings(s){
  const out=[];
  const d=freshnessDays(priceReferenceDate(s));
  if(d===null)out.push('价格未更新');
  else if(d>7)out.push('价格可能过期');
  if(getCurrency(s)==='HKD'&&isDefaultFx())out.push('汇率使用默认值，港股市值和仓位占比可能有偏差');
  if(s.syncStatus==='failed')out.push('刷新失败，当前仍使用旧价格');
  return out;
}
function currentDisplay(s){const isEtf=s.type==='etf';const val=isEtf?fmtMaybe(s.currentValue,0):fmtMaybe(s.currentPrice);const curTag=(getCurrency(s)==='HKD'&&val!=='—')?' <span class="muted" style="font-size:11px;font-weight:400">HKD</span>':'';const date=isEtf?s.valueUpdatedAt:s.priceUpdatedAt;const code=s.code?` · ${esc(s.code)}`:'';const source=s.priceSource?` · ${esc(s.priceSource)}`:'';const status=s.syncStatus==='failed'?' · 刷新失败，仍使用旧价格':(s.syncStatus==='updating'?' · 刷新中':'');const chg=s.dailyChange;const chgHtml=(typeof chg==='number'&&!isNaN(chg))?` <span class="daily-chg ${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span>`:'';const comparable=isEtf?`<div class="text">ETF比较单价：${fmtMaybe(getComparablePrice(s))} · 价位计划按单位净值/单价判断</div>`:'';const risks=priceRiskWarnings(s);const riskHtml=risks.length?`<div class="alert" style="margin-top:6px">${risks.map(esc).join('；')}</div>`:'';return `${val}${curTag}${chgHtml}<div class="text">${freshnessText(date)}${code}${source}${status}</div>${comparable}${riskHtml}`}
function stalePanel(){const items=state.stocks.map(s=>{const date=s.type==='etf'?s.valueUpdatedAt:s.priceUpdatedAt;const val=s.type==='etf'?s.currentValue:s.currentPrice;return {s,date,val,days:daysSince(date)}}).filter(x=>x.val!==''&&x.val!==undefined&&x.val!==null&&(x.days===null||x.days>30));if(!items.length)return '<div class="card" style="margin-bottom:14px"><div class="card-title">数据更新提醒</div><div class="card-note">当前没有超过30天的价格/市值数据。</div></div>';return `<div class="card" style="margin-bottom:14px"><div class="card-title">数据更新提醒（${items.length} 项）</div><div class="stale-list">${items.map(x=>{const days=x.days;const urgent=days===null||days>60;const meta=days===null?'未记录更新时间':`已 ${days} 天未更新`;return `<div class="stale-row"><div class="stale-name">${esc(x.s.name)} <span class="muted" style="font-weight:400">· ${x.s.type==='etf'?'市值':'价格'}</span></div><div class="stale-meta${urgent?' urgent':''}">${meta}</div></div>`}).join('')}</div><div class="alert" style="margin-top:10px">这些数据可能已经不适合直接用于决策。建议按月更新ETF市值，按需更新重点个股价格。</div></div>`}
function freshnessDays(dateStr){const d=normalizeDateOnly(dateStr);if(!d)return null;const t=new Date(d+'T00:00:00').getTime();if(isNaN(t))return null;return Math.floor((Date.now()-t)/86400000)}
function dataFreshnessStatus(dateStr){
  const d=freshnessDays(dateStr);
  if(d===null)return {label:'未更新',cls:'urgent',days:null};
  if(d<=3)return {label:'新鲜',cls:'ok',days:d};
  if(d<=7)return {label:'可用',cls:'ok',days:d};

function normalizeAiReviewPayload(type,payload){
  const cfg=AI_REVIEW_TYPES[type];
  if(!cfg||!payload||typeof payload!=='object'||Array.isArray(payload))return null;
  const source=(payload[type]&&typeof payload[type]==='object'&&!Array.isArray(payload[type]))?payload[type]:payload;
  const out={...source};
  Object.entries(cfg.defaults).forEach(([k,v])=>{
    if(out[k]===undefined)out[k]=Array.isArray(v)?[]:v;
    else if(Array.isArray(v)&&!Array.isArray(out[k]))out[k]=String(out[k]||'').trim()?[String(out[k])]:[];
    else if(!Array.isArray(v)&&out[k]===null)out[k]='';
  });
  return out;
}
function stripJsonFence(text){
  const s=String(text||'').trim();
  const m=s.match(/```(?:json)?\s*([\s\S]*?)```/i);
  return m?m[1].trim():s;
}
function extractFirstJsonObject(text){
  const s=stripJsonFence(text);
  try{return JSON.parse(s)}catch(e){}
  let start=-1,depth=0,inString=false,escape=false;
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(inString){
      if(escape)escape=false;
      else if(ch==='\\')escape=true;
      else if(ch==='"')inString=false;
      continue;
    }
    if(ch==='"'){inString=true;continue}
    if(ch==='{'){
      if(depth===0)start=i;
      depth++;
    }else if(ch==='}'&&depth>0){
      depth--;
      if(depth===0&&start>=0){
        const candidate=s.slice(start,i+1);
        try{return JSON.parse(candidate)}catch(e){}
      }
    }
  }
  throw new Error('未找到合法 JSON 对象');
}

  const f=normalizeDataFreshness(stock.dataFreshness);
  const key=AI_REVIEW_TYPES[type]&&AI_REVIEW_TYPES[type].freshnessKey;

}

function promptRawTextForType(stock,type){
  const ci=normalizeCollectionInputs(stock.collectionInputs);
  const inputs=normalizeAnalysisInputs(stock.analysisInputs);
  if(type==='promptValuation')return {valuationRawText:inputs.valuationRawText};
  if(type==='promptNews')return {newsRawText:ci.newsRawText};
  if(type==='promptFinancial')return {financialRawText:ci.financialRawText};
  if(type==='promptSocial')return {socialRawText:ci.socialRawText};
  if(type==='promptTechnical')return {technicalRawText:ci.technicalRawText};
  return {collectionInputs:ci,valuationRawText:inputs.valuationRawText};
}
function promptMissingRawTextHint(stock,type){
  const raw=promptRawTextForType(stock,type);
  const has=Object.values(raw).some(v=>typeof v==='string'?String(v).trim():Object.values(v||{}).some(x=>String(x||'').trim()));
  if(has||['promptScoreSuggestion','promptActionReview'].includes(type))return '';
  return '提示：当前缺少对应原始资料，请先在信息采集面板或估值助手中粘贴资料。';
}

function shortenPackageText(value,limit=900){
  const s=String(value||'').trim();
  if(!s)return '';
  return s.length>limit?s.slice(0,limit)+`\n...[已截断 ${s.length-limit} 字]`:s;
}
function reviewPackageFreshnessNotes(stock){
  const f=normalizeDataFreshness(stock.dataFreshness);
  const labels={priceUpdatedAt:'价格',valuationUpdatedAt:'估值',newsUpdatedAt:'新闻',socialUpdatedAt:'社媒',financialUpdatedAt:'财报',technicalUpdatedAt:'技术',personalViewUpdatedAt:'个人观点',comprehensiveReviewUpdatedAt:'综合复核'};
  return Object.keys(labels).map(k=>{
    const st=dataFreshnessStatus(f[k]);
    let note=st.label;
    if(st.days===null)note='未更新';
    else if(st.days>30)note='超过30天';
    else if(st.days>7)note='超过7天';
    return {field:k,label:labels[k],date:f[k]||'',days:st.days,note};
  });
}
function buildReviewPackageContext(stock,mode='standard'){
  normalizeStockAnalysis(stock);
  const total=getEstimatedTotalAssets();
  const mv=getMarketValue(stock);
  const currentPrice=Number(stock.currentPrice||stock.currentValue||0);
  const cost=Number(stock.avgCost||0);
  const shares=Number(stock.shares)||0;
  const pnl=(currentPrice>0&&cost>0&&shares>0)?{amount:(currentPrice-cost)*shares,percent:(currentPrice-cost)/cost*100}:null;
  const decision=calculateDecision(stock,{totalMarketValue:total});
  const execution=calculateExecutionPlan(stock,{totalMarketValue:total});
  const inputs=normalizeAnalysisInputs(stock.analysisInputs);
  const ci=normalizeCollectionInputs(stock.collectionInputs);
  const rawMode=mode==='full'?'full':(mode==='standard'?'summary':'none');
  const rawText=rawMode==='none'?{}:{
    valuationRawText:rawMode==='full'?inputs.valuationRawText:shortenPackageText(inputs.valuationRawText),
    newsRawText:rawMode==='full'?ci.newsRawText:shortenPackageText(ci.newsRawText),
    financialRawText:rawMode==='full'?ci.financialRawText:shortenPackageText(ci.financialRawText),
    socialRawText:rawMode==='full'?ci.socialRawText:shortenPackageText(ci.socialRawText),
    technicalRawText:rawMode==='full'?ci.technicalRawText:shortenPackageText(ci.technicalRawText),
    generalRawText:rawMode==='full'?ci.generalRawText:shortenPackageText(ci.generalRawText)
  };
  return {
    packageMode:mode,
    stock:{
      name:stock.name||'',
      symbol:stock.code||'',
      market:getCurrency(stock)||'',
      status:stock.type==='watching'?'观察':'持仓',
      role:stock.role||'',
      theme:stock.theme||'',
      shares,
      cost:stock.avgCost||'',
      currentPrice:stock.currentPrice||stock.currentValue||'',
      holdingValue:mv,
      unrealizedPnl:pnl,
      focus:isFocusStockForUpdate(stock)
    },
    systemJudgement:{
      analysisScore:stock.analysisScore,
      analysisFramework:normalizeAnalysisFramework(stock.analysisFramework,stock),
      strategy:normalizeStrategy(stock.strategy,stock),
      decision,
      executionPlan:execution
    },
    dataFreshness:mode==='compact'?undefined:normalizeDataFreshness(stock.dataFreshness),
    freshnessNotes:reviewPackageFreshnessNotes(stock),
    valuation:{
      valuationData:normalizeValuationData(stock.valuationData),
      valuationRawText:mode==='compact'?undefined:rawText.valuationRawText
    },
    aiReviews:normalizeAiReviews(stock.aiReviews),
    collectionInputs:mode==='compact'?undefined:{
      newsRawText:rawText.newsRawText,
      financialRawText:rawText.financialRawText,
      socialRawText:rawText.socialRawText,
      technicalRawText:rawText.technicalRawText,
      generalRawText:rawText.generalRawText
    },
    personalView:inputs.personalView,
    notes:stock.notes||stock.thesis||'',
    executionLogs:typeof getExecutionLogRows==='function'?getExecutionLogRows(stock.name).slice(0,8):[]
  };
}

abs(reserve),1)+'%</strong>'}${hasCashRow()?' · 实际现金 <strong>'+fmt(getCashMv()/(estAssets||1)*100,1)+'%</strong>':''}${trigBadge}${rebalBadge}`;const trigPanel=allTrig.length?`<div class="card" style="border-left:3px solid var(--seal);margin-bottom:14px"><div class="card-title" style="color:var(--seal);margin-bottom:10px">⚠ 已触发的价位计划（${totalTrig} 条）</div><div class="trig-list">${allTrig.map(x=>{const cp=getComparablePrice(x.s);const triggeredPlans=(x.s.plans||[]).filter(p=>{const g=planGap(cp,p.price,p.action,p.triggerOn);return g&&g.triggered});return triggeredPlans.map(p=>{const isBuy=(p.action||'buy')==='buy';const g=planGap(cp,p.price,p.action,p.triggerOn);const cls=isBuy?'buy':'sell';const dir=g.direction==='below'?'低于目标':'高于目标';return `<div class="trig-row ${cls}"><div class="trig-name">${esc(x.s.name)}</div><div class="trig-dist">${dir} ${g.absPct.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">${isBuy?'▲ 加仓':'▼ 减仓'}</span>目标 ${fmtMaybe(p.price)} · ${fmtInt(p.shares)} 股${p.note?' · '+esc(p.note):''}</div><div class="trig-action"><button data-execute-stock="${x.s.id}" data-execute-plan="${p.id}">✓ 已执行 / 移除提示</button></div></div>`}).join('')}).join('')}</div><div class="alert" style="margin-top:10px">这些价位计划已经满足条件。点击「已执行」会从计划中删除这条；若只是先观望，可忽略不动。</div></div>`:'';const rebalPanel=rebalList.length?`<div class="card" style="border-left:3px solid var(--gold);margin-bottom:14px"><div class="card-title" style="color:var(--gold);margin-bottom:10px">⚖ 需要再平衡（偏差 > 5 个百分点 · ${rebalList.length} 只）</div><div class="trig-list">${rebalList.map(x=>{const over=x.info.status==='overweight';const cls=over?'sell':'buy';const sign=x.info.deviation>=0?'+':'';const act=getRebalanceAction(x.s,x.info,estAssets);const suggest=act?`<div class="trig-suggest"><span class="trig-tag">${act.direction==='sell'?'▼ 建议卖':'▲ 建议买'}</span>≈${fmtInt(act.shares)} 股 · 约 ${fmtMoney(act.money)}（按 ${fmtMaybe(act.unitPrice)}${act.currency==='HKD'?' HKD':''} 算）</div>`:'';return `<div class="trig-row ${cls}"><div class="trig-name">${esc(x.s.name)}</div><div class="trig-dist">${over?'超配':'低配'} ${sign}${x.info.deviation.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">${over?(isCashRow(x.s)?'▼ 按优先级部署':'▼ 减仓'):'▲ 补仓'}</span>目标 ${x.info.target.toFixed(1)}% · 实际 ${x.info.actualPct.toFixed(1)}% · 市值 ${fmtMoney(x.info.mv)}</div>${suggest}</div>`}).join('')}</div><div class="alert" style="margin-top:10px">建议股数按 100 股粒度取整，实际下单请遵守港股/A股最小手数规则。</div></div>`:'';const trimAlerts=state.stocks.map(s=>({s,info:getPositionInfo(s,estAssets)})).map(x=>({s:x.s,info:x.info,act:getTrimAction(x.s,x.info,estAssets)})).filter(x=>x.act);const capAlerts=state.stocks.map(s=>({s,info:getPositionInfo(s,estAssets)})).filter(x=>{const cap=Number(x.s.capPct);return cap>0&&x.info&&x.info.actualPct!==null&&x.info.actualPct>=cap});const tb=themeBreaches(estAssets);const minCash=Number(((state.portfolioStrategy||{}).minimumCashPct)||(((state.portfolioStrategy||{}).cashRule||{}).minimumCashPct)||0);const cashPctNow=hasCashRow()?getCashMv()/(estAssets||1)*100:null;const discRows=[...capAlerts.map(x=>`<div class="trig-row sell"><div class="trig-name">${esc(x.s.name)}</div><div class="trig-dist">占比 ${x.info.actualPct.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">✖ 冻结线</span>已≥冻结线 ${Number(x.s.capPct)}% —— 该标的一切买入计划暂停执行</div></div>`),...trimAlerts.map(x=>`<div class="trig-row sell"><div class="trig-name">${esc(x.s.name)}</div><div class="trig-dist">占比 ${x.info.actualPct.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">▼ 削减线</span>已≥${x.act.trim}% → 按规则削回 ${x.act.toPct}%${x.act.sharesTxt?'（'+x.act.sharesTxt+'）':''}</div></div>`),...tb.map(t=>`<div class="trig-row ${t.level==='hard'?'sell':''}"><div class="trig-name">主题·${esc(t.name)}</div><div class="trig-dist">实际 ${t.a.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">${t.level==='hard'?'✖ 超硬上限':'⚠ 超软上限'}</span>软 ${t.soft}% / 硬 ${t.hard}% —— 该主题新买入需过手册检查清单</div></div>`),...((cashPctNow!==null&&minCash>0&&cashPctNow<minCash)?[`<div class="trig-row sell"><div class="trig-name">现金底线</div><div class="trig-dist">实际 ${cashPctNow.toFixed(1)}%</div><div class="trig-desc"><span class="trig-tag">⚠ 低于底线</span>手册要求 ≥${minCash}%（仅多标的同时进入战略买点可短期至10%）</div></div>`]:[])];const discPanel=discRows.length?`<div class="card" style="border-left:3px solid var(--seal);margin-bottom:14px"><div class="card-title" style="color:var(--seal);margin-bottom:10px">🛑 纪律警报（${discRows.length} 条 · 依据手册规则实时计算）</div><div class="trig-list">${discRows.join('')}</div></div>`:'';const fxRiskHint=(state.stocks.some(s=>getCurrency(s)==='HKD')&&isDefaultFx())?`<div class="hint" style="border-left:3px solid var(--gold)"><b>汇率使用默认值</b>，港股市值和仓位占比可能有偏差。建议点击顶部「汇率」刷新或手动设置。</div>`:'';const noPriceHint=noPriceCount>0?`<div class="hint" style="border-left:3px solid var(--gold)"><b>⚑ ${noPriceCount} 只标的未填当前${noPriceCount===1?'价格/市值':'价格或市值'}</b>，这些标的的实际仓位和偏差无法计算，仪表盘数据可能不准确。建议进入对应分页补充。</div>`:'';document.getElementById('main').innerHTML=`${updateChecklistPanel()}${trigPanel}${discPanel}${rebalPanel}${stalePanel()}${noPriceHint}${fxRiskHint}<div class="hint"><b>定位：</b>这里不是第二个交易软件，不计算实时盈亏。它只记录"为什么买、什么情况下卖、到什么价位做什么"，用于减少关键位置的犹豫。${hasCashRow()?'总资产 = 全部持仓与「现金」行市值的真实合计（旧版按目标比例反推的口径已修正）。':'实际占比按「持有现金=目标现金比例」估算总资产；建议新增一行主题为「现金」的虚拟持仓以启用真实口径。'}港股(HKD)的市值已按 HKD→CNY 汇率折算为人民币后参与总市值与仓位偏差计算，点击顶部「汇率」按钮可联网刷新或手动设置。</div><div class="dash"><div class="card"><div class="card-title">资产目标合计</div><div class="card-num">${fmt(total,1)}%</div><div class="card-note">不含现金/机动资金。</div></div><div class="card"><div class="card-title">现金/机动</div><div class="card-num">${reserve>=0?fmt(reserve,1):'超'+fmt(Math.abs(reserve),1)}%</div><div class="card-note">${hasCashRow()?('实际现金 '+fmt(getCashMv()/(estAssets||1)*100,1)+'%（手册底线见纪律警报）'):'用于等待回调、补核心仓或风险缓冲。'}</div></div><div class="card"><div class="card-title">AI科技目标</div><div class="card-num">${fmt(ai,1)}%</div><div class="card-note">${(()=>{const l=((state.portfolioStrategy||{}).themeLimits||{})['AI科技'];return l?('软上限 '+l.softLimitPct+'% / 硬上限 '+l.hardLimitPct+'%（实际敞口见纪律警报）'):'建议总量约20%-30%，超出后少追。'})()}</div></div><div class="card"><div class="card-title">黄金资源目标</div><div class="card-num">${fmt(res,1)}%</div><div class="card-note">紫金+黄金ETF+有色需合并看。</div></div></div><div class="dash"><div class="card" style="grid-column:span 2"><div class="card-title">主题目标仓位</div><div class="bar-list">${bars(themeRows.concat([{name:'现金/机动',p:Math.max(reserve,0)}]))}</div>${reserve<0?'<div class="alert">目标仓位合计超过100%，需要降低部分标的目标仓位。</div>':(ai>30?'<div class="alert">AI科技目标仓位约30%，新增资金不宜继续集中追科技方向。</div>':'')}</div><div class="card" style="grid-column:span 2"><div class="card-title">角色目标仓位</div><div class="bar-list">${bars(roleRows)}</div>${res>25?'<div class="alert">黄金资源目标仓位超过25%，上涨阶段应以再平衡和止盈纪律为主。</div>':''}</div></div>`;document.querySelectorAll('[data-execute-stock]').forEach(b=>b.addEventListener('click',()=>executePlan(b.dataset.executeStock,b.dataset.executePlan)));document.querySelectorAll('[data-update-stock]').forEach(b=>b.addEventListener('click',()=>openStockDetail(b.dataset.updateStock)));const copyCodes=document.getElementById('copyUpdateCodesBtn');if(copyCodes)copyCodes.addEventListener('click',copyUpdateCodes);const copyPrompt=document.getElementById('copyUpdatePromptBtn');if(copyPrompt)copyPrompt.addEventListener('click',copyUpdatePrompt)}
function bars(rows){return rows.map(r=>`<div class="bar-row"><div>${esc(r.name)}</div><div class="bar-bg"><div class="bar ${r.name.includes('AI')?'ai':r.name.includes('黄金')?'res':r.name.includes('核心')||r.name.includes('宽基')?'core':r.name.includes('卫星')?'sat':''}" style="width:${Math.min(100,r.p)}%"></div></div><div class="num">${fmt(r.p,1)}%</div></div>`).join('')}
function filtered(){return state.stocks.filter(s=>s.type===currentTab)}
function renderTable(){const raw=filtered();const total=getEstimatedTotalAssets();const withU=raw.map(s=>({s,u:stockUrgency(s),info:getPositionInfo(s,total)}));withU.sort((a,b)=>a.u.score-b.u.score);const arr=withU.map(x=>x.s);const totalTrig=withU.reduce((a,b)=>a+b.u.triggered,0);const tabMv=raw.reduce((a,s)=>a+(getMarketValue(s)||0),0);const overweights=withU.filter(x=>x.info&&x.info.status==='overweight').length;const underweights=withU.filter(x=>x.info&&x.info.status==='underweight').length;const typeName=currentTab==='holding'?'个股':currentTab==='etf'?'ETF':'观察';const trigBadge=totalTrig>0?` · <strong style="color:var(--seal)">⚠ 已触发 ${totalTrig} 条</strong>`:'';const rebalBadge=(overweights+underweights)>0?` · <strong style="color:var(--gold)">⚖ 偏差>5% ${overweights+underweights} 只</strong>`:'';document.getElementById('summary').innerHTML=`${typeName} <strong>${arr.length}</strong> 只 · 目标 <strong>${fmt(arr.reduce((a,b)=>a+(Number(b.targetPct)||0),0),1)}%</strong> · 市值 <strong>${fmtMoney(tabMv)}</strong>${trigBadge}${rebalBadge}`;const main=document.getElementById('main');if(!arr.length){main.innerHTML='<div class="empty">暂无标的</div>';return}const trigAlert=totalTrig>0?`<div class="alert-trig">⚠ 当前有 ${totalTrig} 条价位计划已触发，已置顶显示。</div>`:'';main.innerHTML=`${trigAlert}<div class="table-wrap"><table><colgroup><col style="width:7%"><col style="width:6.5%"><col style="width:9.5%"><col style="width:16%"><col style="width:19%"><col style="width:14.5%"><col style="width:5.5%"><col style="width:9.5%"><col style="width:6%"><col style="width:6.5%"></colgroup><thead><tr><th>名称</th><th>定位/主题</th><th>目标/实际</th><th>为什么持有</th><th>加仓/建仓动作</th><th>卖出/降仓条件</th><th>成本</th><th>${currentTab==='etf'?'当前市值':'当前价格'}</th><th>数量</th><th>操作</th></tr></thead><tbody>${arr.map(s=>row(s,total)+(typeof socialPanel==='function'?socialPanel(s):'')).join('')}</tbody></table></div>`;main.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',()=>{if(b.dataset.action==='detail')openStockDetail(b.dataset.id);if(b.dataset.action==='refresh')refreshOnePrice(b.dataset.id);if(b.dataset.action==='edit')openModal(b.dataset.id);if(b.dataset.action==='delete')del(b.dataset.id)}))}
function row(s,total){const cp=getComparablePrice(s);const buys=(s.plans||[]).filter(p=>(p.action||'buy')==='buy').sort((a,b)=>Number(b.price||0)-Number(a.price||0));const sells=(s.plans||[]).filter(p=>p.action==='sell').sort((a,b)=>Number(b.price||0)-Number(a.price||0));const info=getPositionInfo(s,total);let targetCell='';if(!info)targetCell=`<div class="target-line">${fmtMaybe(s.targetPct,1)}%</div>`;else if(info.status==='no-price')targetCell=`<div class="target-line">${info.target.toFixed(1)}%</div><div class="actual-line">实际：未填${s.type==='etf'?'当前市值':'当前价格'}</div><span class="dev-badge na">无法计算偏差</span>`;else{const sign=info.deviation>=0?'+':'';const cls=info.status==='overweight'?'over':info.status==='underweight'?'under':'ok';const word=info.status==='overweight'?'超配':info.status==='underweight'?'低配':'平衡';targetCell=`<div class="target-line">${info.target.toFixed(1)}%</div><div class="actual-line">实际 ${info.actualPct.toFixed(1)}% · ${fmtMoney(info.mv)}</div><span class="dev-badge ${cls}">${word} ${sign}${info.deviation.toFixed(1)}%</span>`;const _cap=Number(s.capPct);if(_cap>0&&info.actualPct>=_cap)targetCell+=`<span class="dev-badge over">✖ ≥冻结线${_cap}%·禁买</span>`;const _ta=getTrimAction(s,info,total);if(_ta)targetCell+=`<span class="dev-badge over">▼ 削减线${_ta.trim}%→削回${_ta.toPct}%${_ta.sharesTxt?'·'+_ta.sharesTxt:''}</span>`}return `<tr><td class="name cell-name"><button class="link-btn detail-name" data-action="detail" data-id="${s.id}">${esc(s.name)}</button></td><td class="cell-role" data-label="定位/主题"><div class="chips"><span class="chip role">${esc(s.role||'—')}</span><span class="chip tag">${esc(s.theme||'—')}</span></div></td><td class="num cell-target" data-label="目标 / 实际">${targetCell}</td><td class="text cell-thesis" data-label="为什么持有">${esc(s.thesis||s.notes||'')||'<span class="muted">—</span>'}</td><td class="cell-buy" data-label="加仓/建仓">${chips(buys,'buy',cp)||'<div class="text">'+esc(s.buyRule||'—')+'</div>'}</td><td class="cell-sell" data-label="卖出/降仓"><div class="text">${esc(s.sellRule||'—')}</div>${sells.length?chips(sells,'sell',cp):''}</td><td class="num cell-cost" data-label="成本">${fmtMaybe(s.avgCost)}</td><td class="num cell-current" data-label="${s.type==='etf'?'当前市值':'当前价格'}">${currentDisplay(s)}</td><td class="num cell-shares" data-label="数量">${fmtInt(s.shares)}</td><td class="cell-actions"><div class="row-actions"><button class="link-btn" data-action="refresh" data-id="${s.id}">${s.type==='etf'?'刷新市值':'刷新价格'}</button><button class="link-btn" data-action="edit" data-id="${s.id}">编辑</button><button class="link-btn danger" data-action="delete" data-id="${s.id}">删除</button></div></td></tr>`}
function chips(ps,type,cp){if(!ps.length)return'';return `<div class="chips">${ps.map(p=>{const g=planGap(cp,p.price,type,p.triggerOn);const trigCls=(g&&g.triggered)?' triggered':'';const arrow=g?(g.direction==='below'?'↓':'↑'):'';const gapHtml=g?(g.triggered?`<span class="gap trig">⚠ 已触发</span>`:`<span class="gap">${arrow}${g.absPct.toFixed(1)}%</span>`):'';return `<span class="chip ${type}${trigCls}"><span>${type==='buy'?'▲':'▼'}</span><span class="price">${fmtMaybe(p.price)}</span><span class="shares">${fmtInt(p.shares)}</span>${gapHtml}${p.note?`<span>· ${esc(p.note)}</span>`:''}</span>`}).join('')}</div>`}
function setType(t){formType=t;document.querySelectorAll('#typeToggle button').forEach(b=>b.classList.toggle('active',b.dataset.type===t));document.getElementById('sellBox').style.display=t==='watching'?'none':'block'}
function openModal(id){editingId=id||null;const s=state.stocks.find(x=>x.id===id);document.getElementById('modalTitle').textContent=s?'编辑标的':'新增标的';setType(s?s.type:(currentTab==='etf'?'etf':currentTab==='watching'?'watching':'holding'));document.getElementById('fName').value=s?.name||'';document.getElementById('fCode').value=s?.code||'';document.getElementById('fCurrency').value=s?.currency||'';document.getElementById('fShares').value=s?.shares??'';document.getElementById('fCost').value=s?.avgCost??'';document.getElementById('fTarget').value=s?.targetPct??'';document.getElementById('fTrim').value=s?.trimPct??'';document.getElementById('fTrimTo').value=s?.trimToPct??'';document.getElementById('fCap').value=s?.capPct??'';document.getElementById('fCurrentPrice').value=s?.currentPrice??'';document.getElementById('fCurrentValue').value=s?.currentValue??'';document.getElementById('fRole').value=s?.role||'核心仓';document.getElementById('fTheme').value=s?.theme||'其他';document.getElementById('fThesis').value=s?.thesis||s?.notes||'';document.getElementById('fSellRule').value=s?.sellRule||'';document.getElementById('fNotes').value=s?.notes||'';const ps=s?.plans||[];tempBuy=ps.filter(p=>(p.action||'buy')==='buy').map(p=>({...p}));tempSell=ps.filter(p=>p.action==='sell').map(p=>({...p}));renderPlanEditor();document.getElementById('modal').classList.add('show');setTimeout(()=>document.getElementById('fName').focus(),50)}

function getExecutionLogRows(stockName=logStockFilter){
  const logs=Array.isArray(state.executionLog)?state.executionLog:[];
  return logs
    .filter(x=>!stockName||x.stock===stockName)
    .slice()
    .sort((a,b)=>(Number(b.t)||0)-(Number(a.t)||0));

function executionLogAmount(x){
  const amount=Number(x.amount);
  if(!isNaN(amount)&&amount>0)return amount;
  const price=Number(x.price),shares=Number(x.shares);
  if(isNaN(price)||isNaN(shares))return null;
  return price*shares;
}
function executionLogTime(x){
  const t=Number(x.t);
  if(!t)return '—';
  return new Date(t).toLocaleString('zh-CN');
}
function executionLogAction(x){

function analysisModuleScore(stock,key){
  const fw=normalizeAnalysisFramework(stock.analysisFramework,stock);
  return normalizeAnalysisScoreValue(fw[key]&&fw[key].score);
}
function analysisModuleStatus(stock,key){
  const fw=normalizeAnalysisFramework(stock.analysisFramework,stock);
  return analysisStatusText(fw[key]&&fw[key].status);
}
function analysisPositionRole(stock){
  const fw=normalizeAnalysisFramework(stock.analysisFramework,stock);
  return fw.conclusion.positionRole||stock.role||'';
}
function analysisActionPlan(stock){
  const fw=normalizeAnalysisFramework(stock.analysisFramework,stock);
  return fw.conclusion.actionPlan||'';
}
function analysisStatusForFilter(stock){
  const fw=normalizeAnalysisFramework(stock.analysisFramework,stock);
  const statuses=ANALYSIS_MODULES.map(k=>analysisStatusText(fw[k]&&fw[k].status));
  if(statuses.includes('negative'))return 'negative';
  if(statuses.includes('positive'))return 'positive';
  return 'neutral';
}
function analysisScoreInRange(score,range){
  if(!range)return true;
  if(range==='gte8')return score>=8;
  if(range==='6to8')return score>=6&&score<8;
  if(range==='lt6')return score<6;
  return true;
}
function analysisSortRows(rows){
  const score=(x,k)=>analysisModuleScore(x,k);
  const byName=(a,b)=>String(a.name||'').localeCompare(String(b.name||''),'zh-CN');
  rows.sort((a,b)=>{
    if(analysisSortMode==='score_asc')return (a.analysisScore-b.analysisScore)||byName(a,b);
    if(analysisSortMode==='risk_asc')return (score(a,'risks')-score(b,'risks'))||byName(a,b);
    if(analysisSortMode==='valuation_desc')return (score(b,'valuation')-score(a,'valuation'))||byName(a,b);
    if(analysisSortMode==='technical_desc')return (score(b,'technical')-score(a,'technical'))||byName(a,b);
    if(analysisSortMode==='decision_desc')return (decisionForStock(b).decisionScore-decisionForStock(a).decisionScore)||byName(a,b);
    if(analysisSortMode==='gap_desc')return (decisionForStock(b).positionGap-decisionForStock(a).positionGap)||byName(a,b);
    if(analysisSortMode==='priority_asc')return (normalizeStrategy(a.strategy,a).priority-normalizeStrategy(b.strategy,b).priority)||byName(a,b);
    if(analysisSortMode==='buy_amount_desc')return (executionForStock(b).suggestedBuyAmount-executionForStock(a).suggestedBuyAmount)||byName(a,b);
    if(analysisSortMode==='buy_shares_desc')return (executionForStock(b).suggestedShares-executionForStock(a).suggestedShares)||byName(a,b);
    if(analysisSortMode==='auto_technical_desc')return (calculateTechnicalSignal(b).technicalScore-calculateTechnicalSignal(a).technicalScore)||byName(a,b);
    if(analysisSortMode==='freshness_days_desc')return ((getAnalysisFreshness(b).daysSinceUpdate??-1)-(getAnalysisFreshness(a).daysSinceUpdate??-1))||byName(a,b);
    if(analysisSortMode==='auto_valuation_desc')return (calculateValuationSignal(b).valuationScore-calculateValuationSignal(a).valuationScore)||byName(a,b);
    if(analysisSortMode==='valuation_updated_desc')return (String(normalizeValuationData(b.valuationData).lastUpdated||'').localeCompare(String(normalizeValuationData(a.valuationData).lastUpdated||'')))||byName(a,b);
    if(analysisSortMode==='auto_financial_desc')return (calculateFinancialSignal(b).financialScore-calculateFinancialSignal(a).financialScore)||byName(a,b);
    if(analysisSortMode==='financial_updated_desc')return (String(normalizeFinancialData(b.financialData).lastUpdated||'').localeCompare(String(normalizeFinancialData(a.financialData).lastUpdated||'')))||byName(a,b);
    return (b.analysisScore-a.analysisScore)||byName(a,b);
  });
  return rows;
}

function saveAnalysisModule(){
  const modal=document.getElementById('analysisModal');
  const stock=state.stocks.find(x=>x.id===modal?.dataset.stockId);
  const key=modal?.dataset.moduleKey;
  if(!stock||!key)return;
  const base={summary:document.getElementById('afSummary').value.trim(),score:normalizeAnalysisScoreValue(document.getElementById('afScore').value),status:document.getElementById('afStatus').value};
  const fw=normalizeAnalysisFramework(stock.analysisFramework,stock);
  if(key==='conclusion'){
    fw.conclusion=normalizeConclusionModule({...fw.conclusion,...base,positionRole:document.getElementById('afPositionRole').value.trim(),actionPlan:document.getElementById('afActionPlan').value.trim(),buyRules:parseAnalysisLines(document.getElementById('afBuyRules').value),sellRules:parseAnalysisLines(document.getElementById('afSellRules').value),invalidationConditions:parseAnalysisLines(document.getElementById('afInvalidationConditions').value)},stock);
  }else{
    fw[key]=normalizeAnalysisModule({...fw[key],...base,keyPoints:parseAnalysisLines(document.getElementById('afKeyPoints').value),watchItems:parseAnalysisLines(document.getElementById('afWatchItems').value)});
  }
  stock.analysisFramework=fw;
  stock.analysisScore=calculateAnalysisScore(fw);
  saveState();
  closeAnalysisModal();
  render();
}

function buildAnalysisPrompt(stock){
  normalizeStockAnalysis(stock);
  const payload={
    stock:{
      name:stock.name||'',
      code:stock.code||'',
      shares:stock.shares||0,
      avgCost:stock.avgCost||'',
      currentPrice:stock.type==='etf'?(stock.currentValue||''):(stock.currentPrice||''),
      positionRole:analysisPositionRole(stock)||stock.role||'',
      buyPlans:planPromptList(stock.plans,'buy'),
      sellPlans:planPromptList(stock.plans,'sell'),
      analysisInputs:normalizeAnalysisInputs(stock.analysisInputs),
      currentAnalysisFramework:stock.analysisFramework
    },
    outputSchema:{analysisFramework:defaultAnalysisFramework(stock)}
  };
  return [
    '你是一名严谨的投资研究助理。请基于以下股票资料，按照九模块股票分析框架更新 analysisFramework。',
    '',
    '要求：',
    '1. 只输出严格 JSON，不要输出 Markdown，不要解释。',
    '2. JSON 顶层必须只有 analysisFramework。',
    '3. score 必须是 0-10 数字，status 只能是 positive / neutral / negative。',
    '4. keyPoints、watchItems、buyRules、sellRules、invalidationConditions 必须是数组。',
    '5. 不要给出确定性买卖指令，只给复核型 actionPlan 和规则。',
    '6. 保留无法判断的信息为空字符串或空数组。',
    '',
    '股票资料：',
    JSON.stringify(payload.stock,null,2),
    '',
    '请严格按以下 JSON 结构输出：',
    JSON.stringify(payload.outputSchema,null,2)
  ].join('\n');
}

function buildAiAssistantPrompt(stock,task){
  const ctx=aiAssistantContext(stock);
  const label=(AI_ASSISTANT_TASKS[task]||AI_ASSISTANT_TASKS.analysis).label;
  const taskRules={
    analysis:['更新完整九模块 analysisFramework。','不要覆盖 strategy、priceHistory、technicalData、valuationData、financialData。','只输出顶层包含 analysisFramework 的严格 JSON。'],
    strategy:['生成 strategy 策略建议。','targetWeight / targetShares 可同时给；如能基于用户目标推断目标股数，优先给 targetShares。','maxWeight 必须 >= targetWeight；minWeight 不得高于 targetWeight。','priority 1 最高、10 最低；convictionLevel 0-10。','buyAggressiveness 只能是 conservative / normal / aggressive。','不要给出过度激进策略，策略仅为辅助建议，最终由用户确认。','只输出顶层包含 strategy 的严格 JSON。'],
    valuation:['更新估值判断。','结合当前 valuationData、九模块 valuation 和 analysisInputs.valuationRawText。','优先返回 valuationData；如果只做九模块估值判断，也可以返回 analysisFramework.valuation。','如果不确定，请优先返回 valuationData 并保留无法判断的字段为 0 或空字符串。','只输出严格 JSON。'],
    financial:['更新财务数据。','结合当前 financialData、九模块 financials、valuationData 和 analysisInputs.financialReport。','只返回顶层包含 financialData 的严格 JSON。','不要覆盖 analysisFramework.financials，用户会在本地点击“应用到九模块财务评分”。'],
    conclusion:['只更新 investment conclusion，即 analysisFramework.conclusion。','结合九模块评分、策略、决策分、执行建议和风险提示，给出复核型结论。','不要输出确定性买卖指令。','只输出顶层包含 analysisFramework.conclusion 的严格 JSON。']
  }[task]||[];
  return [
    `你是一名严谨的投资研究助理。当前任务：${label}。`,
    '',
    '通用要求：',
    '1. 只输出严格 JSON，不要输出 Markdown，不要解释。',
    '2. score 必须是 0-10 数字，status 只能是 positive / neutral / negative。',
    '3. 数组字段必须输出数组；无法判断的信息保留为空字符串、0 或空数组。',
    '4. 该结果仅作为投资复核辅助，不构成买卖指令，最终由用户确认。',
    '',
    '任务要求：',
    ...taskRules.map((x,i)=>`${i+1}. ${x}`),
    '',
    '当前股票上下文：',
    JSON.stringify(ctx,null,2),
    '',
    '请严格按以下 JSON 结构输出：',
    JSON.stringify(aiAssistantSchema(task),null,2)
  ].join('\n');
}
function applyAiAssistantResult(stock,parsed,task){
  if(!stock||!parsed||typeof parsed!=='object')return {ok:false,message:'JSON 必须是对象。'};
  if(parsed.strategy&&typeof parsed.strategy==='object'){
    stock.strategy=normalizeStrategy(parsed.strategy,stock);
    return {ok:true,message:'已导入策略建议。'};
  }
  if(parsed.valuationData&&typeof parsed.valuationData==='object'){
    stock.valuationData=normalizeValuationData({...parsed.valuationData,lastUpdated:parsed.valuationData.lastUpdated||new Date().toISOString()});
    touchDataFreshness(stock,'valuationUpdatedAt');
    return {ok:true,message:'已导入估值数据。'};
  }
  if(parsed.financialData&&typeof parsed.financialData==='object'){
    stock.financialData=normalizeFinancialData({...parsed.financialData,lastUpdated:parsed.financialData.lastUpdated||new Date().toISOString()});
    touchDataFreshness(stock,'financialUpdatedAt');
    return {ok:true,message:'已导入财务数据。'};
  }
  if(parsed.analysisFramework&&typeof parsed.analysisFramework==='object'){
    const fw=normalizeAnalysisFramework(stock.analysisFramework,stock);
    const frameworkKeys=Object.keys(parsed.analysisFramework);
    if((task==='conclusion'&&parsed.analysisFramework.conclusion)||(parsed.analysisFramework.conclusion&&frameworkKeys.length===1)){
      fw.conclusion=normalizeConclusionModule(parsed.analysisFramework.conclusion,stock);
      stock.analysisFramework=fw;
      stock.analysisScore=calculateAnalysisScore(fw);
      return {ok:true,message:'已导入投资结论。'};
    }
    if((task==='valuation'&&parsed.analysisFramework.valuation)||(parsed.analysisFramework.valuation&&frameworkKeys.length===1)){
      fw.valuation=normalizeAnalysisModule(parsed.analysisFramework.valuation);
      stock.analysisFramework=fw;
      stock.analysisScore=calculateAnalysisScore(fw);
      return {ok:true,message:'已导入九模块估值判断。'};
    }
    stock.analysisFramework=normalizeAnalysisFramework(parsed.analysisFramework,stock);
    stock.analysisScore=calculateAnalysisScore(stock.analysisFramework);
    return {ok:true,message:'已导入九模块分析。'};
  }
  return {ok:false,message:'未识别可导入字段：需要 analysisFramework、strategy、valuationData 或 financialData。'};
}

function csvRows(text){
  const rows=[];
  let row=[],cell='',q=false;
  const s=String(text||'').replace(/^\uFEFF/,'');
  for(let i=0;i<s.length;i++){
    const ch=s[i],next=s[i+1];
    if(q){
      if(ch==='"'&&next==='"'){cell+='"';i++}
      else if(ch==='"')q=false;
      else cell+=ch;
    }else if(ch==='"')q=true;
    else if(ch===','){row.push(cell);cell=''}
    else if(ch==='\n'){row.push(cell);rows.push(row);row=[];cell=''}
    else if(ch==='\r'){}
    else cell+=ch;
  }
  row.push(cell);
  if(row.some(x=>String(x).trim()!==''))rows.push(row);
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
function normalizedHeader(v){return String(v||'').trim().toLowerCase().replace(/\s+/g,' ')}
function pickCsvColumn(headers,names){
  const set=names.map(normalizedHeader);
  return headers.findIndex(h=>set.includes(normalizedHeader(h)));
}
function parsePriceHistoryCsv(text){
  const rows=csvRows(text);
  if(rows.length<2)return {records:[],invalidCount:rows.length,warnings:['CSV 没有可解析的数据行']};
  const headers=rows[0].map(x=>String(x||'').trim());
  let dateIdx=pickCsvColumn(headers,['date','日期']);
  let closeIdx=pickCsvColumn(headers,['close','adj close','price','收盘价','收盘','价格']);
  if(dateIdx<0)dateIdx=0;
  if(closeIdx<0)closeIdx=1;
  const records=[];
  let invalidCount=0;
  rows.slice(1).forEach(r=>{
    const date=normalizePriceDate(r[dateIdx]);
    const close=normalizeClosePrice(r[closeIdx]);
    if(date&&close>0)records.push({date,close});
    else invalidCount++;
  });
  const normalized=normalizePriceHistory(records);
  const duplicateCount=records.length-normalized.length;
  return {records:normalized,invalidCount,duplicateCount,warnings:[]};
}

  const hadConclusionContent=Boolean(current.conclusion.summary||current.conclusion.actionPlan||current.conclusion.score||current.conclusion.buyRules.length||current.conclusion.sellRules.length||current.conclusion.invalidationConditions.length);
  const next={};
  ANALYSIS_MODULES.forEach(key=>{
    next[key]=key==='conclusion'?mergeConclusionModule(current[key],source[key],stock,overwrite):mergeAnalysisModule(current[key],source[key],overwrite);
  });
  next.risks.keyPoints=overwrite||!next.risks.keyPoints.length?normalizeStringArray(tpl.risks):next.risks.keyPoints;
  ANALYSIS_MODULES.forEach(key=>{
    if(overwrite||!next[key].watchItems.length)next[key].watchItems=normalizeStringArray(tpl.watchItems);
  });
  if(overwrite||isEmptyAnalysisValue(next.conclusion.positionRole)||!hadConclusionContent)next.conclusion.positionRole=tpl.positionRole||next.conclusion.positionRole;
  stock.analysisFramework=normalizeAnalysisFramework(next,stock);
  stock.analysisInputs=mergeAnalysisInputs(stock.analysisInputs,tpl.analysisInputs,overwrite);
  stock.analysisScore=calculateAnalysisScore(stock.analysisFramework);
  return true;
}
