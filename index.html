<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资作战手册 V9.3.1</title>
<style>
:root{--paper:#F5F1E8;--paper2:#EFEADE;--ink:#1B1B1B;--ink2:#4A4A48;--ink3:#8A857A;--seal:#B83A2B;--sealsoft:rgba(184,58,43,.08);--teal:#2F5D6E;--tealsoft:rgba(47,93,110,.10);--gold:#9A6B24;--goldsoft:rgba(154,107,36,.12);--purple:#6A4C93;--purplesoft:rgba(106,76,147,.11);--line:rgba(27,27,27,.14);--lines:rgba(27,27,27,.28);}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background-image:radial-gradient(rgba(27,27,27,.025) 1px,transparent 1px);background-size:18px 18px}.wrap{max-width:1380px;margin:0 auto;padding:34px 22px 70px}header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--ink);padding-bottom:16px;margin-bottom:18px;gap:16px}.brand{display:flex;gap:14px;align-items:center}.seal{width:42px;height:42px;border-radius:4px;background:var(--seal);color:var(--paper);display:grid;place-items:center;font-size:22px;font-weight:800;transform:rotate(-3deg)}h1{margin:0;font-family:Georgia,"Songti SC",serif;font-size:30px;letter-spacing:3px}.sub,.date{color:var(--ink3);font-size:11px;letter-spacing:1.8px}.date{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:nowrap;color:var(--ink2)}.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:14px}.tab{background:0;border:0;padding:13px 18px 11px;margin-bottom:-1px;border-bottom:2px solid transparent;color:var(--ink3);font-weight:700;letter-spacing:1px;white-space:nowrap;cursor:pointer}.tab.active{color:var(--ink);border-bottom-color:var(--seal)}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.summary{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:var(--ink2)}.summary strong{color:var(--ink)}.actions{display:flex;gap:8px;flex-wrap:wrap}button{font:inherit}.btn{background:var(--ink);color:var(--paper);border:1px solid var(--ink);padding:8px 13px;border-radius:2px;font-weight:700;cursor:pointer;letter-spacing:.8px}.btn:hover{background:var(--seal);border-color:var(--seal)}.btn.ghost{background:transparent;color:var(--ink2);border-color:var(--lines)}.btn.ghost:hover{color:var(--ink);background:transparent;border-color:var(--ink)}.btn.small{font-size:12px;padding:6px 10px}.sync{min-height:14px;color:var(--ink3);font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;margin-bottom:14px}.hint{border:1px solid var(--line);background:rgba(255,255,255,.22);padding:12px 14px;margin-bottom:14px;color:var(--ink2);font-size:13px;line-height:1.65}.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.card{border:1px solid var(--line);background:rgba(245,241,232,.82);padding:14px}.card-title{font-size:11px;color:var(--ink3);font-weight:800;letter-spacing:1.6px;margin-bottom:8px}.card-num{font-size:24px;font-weight:800;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.card-note{font-size:12px;color:var(--ink3);margin-top:4px;line-height:1.5}.bar-list{display:grid;gap:9px}.bar-row{display:grid;grid-template-columns:76px 1fr 48px;gap:8px;align-items:center;font-size:12px}.bar-bg{height:8px;border:1px solid var(--line);background:rgba(255,255,255,.25);overflow:hidden}.bar{height:100%;background:var(--ink)}.bar.ai{background:var(--seal)}.bar.res{background:var(--gold)}.bar.core{background:var(--teal)}.bar.sat{background:var(--purple)}.alert{padding:9px 10px;border-left:3px solid #A65E2E;background:rgba(166,94,46,.08);font-size:12px;color:var(--ink2);line-height:1.5;margin-top:8px}.table-wrap{border:1px solid var(--line);background:rgba(245,241,232,.82);overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1180px}th{text-align:left;color:var(--ink3);font-size:11px;letter-spacing:1.3px;padding:12px;border-bottom:1px solid var(--ink);white-space:nowrap}td{padding:12px;border-bottom:1px solid var(--line);vertical-align:top}tr:hover{background:rgba(255,255,255,.28)}.name{font-weight:800;font-size:15px;min-width:120px}.num{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:nowrap}.muted{color:var(--ink3)}.text{font-size:12px;line-height:1.55;color:var(--ink2);max-width:260px}.chips{display:flex;flex-wrap:wrap;gap:6px;max-width:380px}.chip{display:inline-flex;flex-wrap:wrap;align-items:center;gap:5px;border-radius:14px;padding:4px 9px;font-size:12px;line-height:1.35;white-space:normal;max-width:100%;overflow-wrap:anywhere}.chip .price,.chip .shares,.chip .gap{white-space:nowrap}.buy{color:var(--seal);background:var(--sealsoft)}.sell{color:var(--teal);background:var(--tealsoft)}.chip.triggered{background:var(--seal);color:#fff;font-weight:800;box-shadow:0 0 0 2px rgba(184,58,43,.18);animation:pulse 2.4s ease-in-out infinite}.chip.triggered.sell{background:var(--teal);box-shadow:0 0 0 2px rgba(47,93,110,.20)}.chip .gap{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:var(--ink3);margin-left:2px;font-weight:700}.chip.triggered .gap{color:inherit}.chip .gap.trig{font-weight:800;letter-spacing:.5px}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.72}}.alert-trig{padding:9px 12px;border-left:3px solid var(--seal);background:rgba(184,58,43,.08);font-size:13px;color:var(--ink);line-height:1.5;margin-bottom:14px;font-weight:600}.trig-list{display:flex;flex-direction:column;gap:8px}.trig-row{padding:10px 12px;background:rgba(184,58,43,.06);border:1px solid rgba(184,58,43,.20);border-left:3px solid var(--seal);display:grid;grid-template-columns:1fr auto;column-gap:10px;row-gap:4px;align-items:baseline}.trig-row.sell{border-left-color:var(--teal);background:rgba(47,93,110,.06);border-color:rgba(47,93,110,.20)}.trig-row .trig-name{font-weight:800;font-size:15px;color:var(--ink)}.trig-row .trig-dist{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:800;font-size:13px;color:var(--seal);white-space:nowrap;text-align:right}.trig-row.sell .trig-dist{color:var(--teal)}.trig-row .trig-desc{grid-column:1/-1;font-size:12px;color:var(--ink2);line-height:1.55}.trig-row .trig-tag{display:inline-block;font-weight:800;margin-right:4px}.trig-row.buy .trig-tag{color:var(--seal)}.trig-row.sell .trig-tag{color:var(--teal)}.trig-action{grid-column:1/-1;text-align:right;margin-top:4px;padding-top:6px;border-top:1px dashed rgba(27,27,27,.12)}.trig-action button{background:transparent;border:1px solid var(--lines);color:var(--ink2);padding:5px 14px;font-size:12px;cursor:pointer;border-radius:2px;font-weight:700;letter-spacing:.5px;font-family:inherit}.trig-action button:hover{background:var(--seal);color:var(--paper);border-color:var(--seal)}.trig-row.sell .trig-action button:hover{background:var(--teal);border-color:var(--teal)}.daily-chg{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;font-weight:800;margin-left:4px;letter-spacing:.3px;white-space:nowrap}.daily-chg.up{color:#C84545}.daily-chg.down{color:#2A7942}.trig-suggest{grid-column:1/-1;margin-top:6px;padding:8px 10px;background:rgba(154,107,36,.10);border-left:2px solid var(--gold);font-size:12.5px;font-weight:700;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.3px}.trig-suggest .trig-tag{font-weight:800;margin-right:6px;color:var(--gold)}.cell-target .target-line{font-weight:800;font-size:14px;color:var(--ink)}.cell-target .actual-line{font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.4;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.dev-badge{display:inline-block;font-weight:800;font-size:11px;padding:1px 6px;border-radius:3px;margin-top:2px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.5px}.dev-badge.over{color:var(--teal);background:var(--tealsoft)}.dev-badge.under{color:var(--seal);background:var(--sealsoft)}.dev-badge.ok{color:var(--ink3);background:transparent;padding-left:0;padding-right:0}.dev-badge.na{color:var(--ink3);background:transparent;font-style:italic;font-weight:400;padding-left:0;padding-right:0}.stale-list{display:flex;flex-direction:column;gap:0}.stale-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:12px}.stale-row:last-child{border-bottom:0}.stale-name{font-weight:700;color:var(--ink);font-size:13px}.stale-meta{color:var(--ink3);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;text-align:right;white-space:nowrap}.stale-meta.urgent{color:var(--seal);font-weight:700}.tag{color:var(--purple);background:var(--purplesoft)}.role{color:var(--gold);background:var(--goldsoft)}.price,.shares{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:800}.row-actions{display:flex;gap:8px;white-space:nowrap}.link-btn{background:0;border:0;color:var(--ink2);cursor:pointer;padding:2px 0;font-size:12px}.link-btn:hover{color:var(--seal)}.danger{color:var(--seal)}.empty{text-align:center;padding:60px 20px;color:var(--ink3)}.modal-bg{position:fixed;inset:0;background:rgba(27,27,27,.45);display:none;align-items:center;justify-content:center;z-index:10;padding:16px}.modal-bg.show{display:flex}.modal{width:min(720px,100%);max-height:92vh;overflow:auto;background:var(--paper);border:1px solid var(--ink);box-shadow:6px 6px 0 rgba(27,27,27,.15);padding:22px}.modal h2{margin:0 0 4px;font-family:Georgia,"Songti SC",serif;letter-spacing:2px;font-size:20px}.modal-sub{color:var(--ink3);font-size:11px;letter-spacing:1px;margin-bottom:16px}.form-row{margin-bottom:13px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}label{display:block;color:var(--ink2);font-size:11px;letter-spacing:1.5px;font-weight:800;margin-bottom:5px}input,textarea,select{width:100%;border:1px solid var(--lines);background:var(--paper);color:var(--ink);padding:9px 11px;border-radius:2px;font-size:14px}textarea{min-height:70px;resize:vertical}input:focus,textarea:focus,select:focus{outline:none;border-color:var(--seal)}.type-toggle{display:flex;border:1px solid var(--lines);overflow:hidden}.type-toggle button{flex:1;border:0;background:transparent;color:var(--ink3);padding:10px;cursor:pointer;font-weight:700}.type-toggle button.active{background:var(--ink);color:var(--paper)}.plan-editor{border:1px solid var(--line);padding:10px}.plan-table{width:100%;min-width:0}.plan-table th,.plan-table td{padding:6px;border-bottom:1px solid var(--line);font-size:12px}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.social-cell{padding-top:0;background:rgba(255,255,255,.16)}.social-panel{border:1px dashed var(--line);background:rgba(255,255,255,.18);padding:10px 12px;margin:0 0 4px}.social-panel summary{cursor:pointer;font-weight:800;color:var(--ink2);font-size:12px;letter-spacing:1px;list-style:none}.social-panel summary::-webkit-details-marker{display:none}.social-panel summary::before{content:'+';display:inline-grid;place-items:center;width:16px;height:16px;margin-right:6px;border:1px solid var(--lines);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}.social-panel[open] summary::before{content:'-'}.social-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0}.social-metric{border:1px solid var(--line);padding:9px;background:rgba(245,241,232,.68);min-width:0}.social-label{font-size:10px;color:var(--ink3);font-weight:800;letter-spacing:1px;margin-bottom:4px}.social-value{font-size:13px;font-weight:800;color:var(--ink);line-height:1.35}.social-list{display:grid;gap:7px;margin-top:8px}.social-post{border-top:1px dashed var(--line);padding-top:8px;font-size:12px;line-height:1.55;color:var(--ink2)}.social-post:first-child{border-top:0}.social-post-head{display:flex;justify-content:space-between;gap:8px;color:var(--ink3);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px}.social-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}.social-tag{border:1px solid var(--line);padding:1px 6px;border-radius:10px;color:var(--ink3);font-size:11px}.social-risk{color:var(--seal);font-weight:700}.social-empty{font-size:12px;color:var(--ink3);padding:8px 0}.social-review{border:1px solid var(--line);background:rgba(255,255,255,.28);padding:10px;margin:10px 0}.social-review-note{font-size:11px;color:var(--seal);font-weight:800;margin:6px 0}.social-review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}.social-review-block{min-width:0}.social-review-block ul{margin:4px 0 0;padding-left:16px}.social-review-block li{font-size:12px;line-height:1.55;color:var(--ink2);margin:2px 0}
.detail-name{font-size:15px;font-weight:800;color:var(--ink);text-align:left}.detail-name:hover{color:var(--seal)}
@media(min-width:901px){
.table-wrap table{table-layout:fixed}
td{overflow-wrap:anywhere;padding:12px 9px}
th{padding:12px 9px}
.cell-cost,.cell-shares{font-size:13px}
.text,.chips{max-width:none}
.cell-target,.cell-target .actual-line,.cell-current{white-space:normal}
.cell-role .chips{flex-direction:column;align-items:flex-start;gap:5px}
.cell-actions .row-actions{flex-direction:column;align-items:flex-start;gap:5px}
}
@media(max-width:900px){.wrap{padding:24px 14px 56px}header{align-items:flex-start;flex-direction:column}h1{font-size:24px}.dash{grid-template-columns:1fr 1fr}.toolbar{align-items:flex-start;flex-direction:column}.two,.three{grid-template-columns:1fr}.table-wrap{border:0;background:transparent;overflow:visible}table,thead,tbody,tr,td{display:block;width:100%;min-width:0}thead{display:none}tbody tr{display:flex;flex-direction:column;gap:8px;background:rgba(245,241,232,.92);border:1px solid var(--line);border-left:3px solid var(--ink);padding:12px;margin-bottom:12px}td{border:0;padding:0}td[data-label]::before{content:attr(data-label);display:block;color:var(--ink3);font-size:10px;letter-spacing:1.5px;font-weight:800;margin-bottom:4px}.cell-name{order:0}.cell-role{order:1}.cell-target{order:2}.cell-thesis{order:3}.cell-buy{order:4}.cell-sell{order:5}.cell-cost{order:6}.cell-current{order:7}.cell-shares{order:8}.cell-actions{order:9}.cell-name::before,.cell-actions::before{display:none}.name{font-size:18px;min-width:0;padding-bottom:4px;border-bottom:1px solid var(--line)}.text,.chips{max-width:none}.chip{white-space:normal}.row-actions{justify-content:flex-end}.social-row{border-left-color:var(--gold)}.social-grid{grid-template-columns:1fr 1fr}.social-review-grid{grid-template-columns:1fr}.social-post-head{display:block}.social-cell{padding:0}}@media(max-width:520px){.dash{grid-template-columns:1fr}.tab{padding-left:13px;padding-right:13px}.social-grid{grid-template-columns:1fr}}
</style>
</head>
<body><div class="wrap">
<header><div class="brand"><div class="seal">策</div><div><h1>投资作战手册 V9.3.1</h1><div class="sub">Thesis · Discipline · Action Plan</div></div></div><div class="date" id="dateStamp"></div></header>
<div class="tabs"><button class="tab active" data-tab="dashboard">总览</button><button class="tab" data-tab="holding">个股 <span id="countHolding" class="count">0</span></button><button class="tab" data-tab="etf">ETF <span id="countEtf" class="count">0</span></button><button class="tab" data-tab="watching">观察 <span id="countWatching" class="count">0</span></button></div>
<div class="toolbar"><div class="summary" id="summary">—</div><div class="actions"><button class="btn ghost small" id="fxBtn" title="点击设置或刷新 HKD→CNY 汇率">汇率 —</button><button class="btn ghost small" id="importBtn">导入JSON</button><button class="btn ghost small" id="exportBtn">导出</button><button class="btn ghost small" id="socialImportBtn">导入 social_posts.json</button><button class="btn ghost small" id="resetBtn">清空本地数据</button><button class="btn ghost small" id="refreshAllBtn">刷新全部价格</button><button class="btn" id="addBtn">＋ 新增标的</button><input type="file" id="importFile" accept=".json,application/json" style="display:none"><input type="file" id="socialImportFile" accept=".json,application/json" style="display:none"></div></div><div class="sync" id="syncHint"></div><div class="sync" id="socialDataStatus">社媒数据更新时间：—</div><div id="main"></div>
</div>
<div class="modal-bg" id="modal"><div class="modal"><h2 id="modalTitle">新增标的</h2><div class="modal-sub">只记录决策依据，不重复交易软件里的盈亏统计</div>
<div class="form-row"><label>类型</label><div class="type-toggle" id="typeToggle"><button data-type="holding">个股</button><button data-type="etf">ETF</button><button data-type="watching">观察</button></div></div>
<div class="form-row three"><div><label>名称</label><input id="fName" placeholder="例如：紫金矿业 / 沪深300ETF"></div><div><label>行情代码（联网价格，可选）</label><input id="fCode" placeholder="港股如 1810.HK；A股如 601138.SS"></div><div><label>计价货币</label><select id="fCurrency"><option value="">自动（按代码判断）</option><option value="CNY">CNY 人民币</option><option value="HKD">HKD 港币</option></select></div></div>
<div class="form-row three"><div><label>持仓股数/份额</label><input type="number" step="any" id="fShares"></div><div><label>成本价（可选）</label><input type="number" step="any" id="fCost"></div><div><label>目标仓位%</label><input type="number" step="any" id="fTarget"></div></div><div class="form-row three"><div><label>削减线%（占比≥即提醒）</label><input type="number" step="any" id="fTrim" placeholder="如 12"></div><div><label>削回至%</label><input type="number" step="any" id="fTrimTo" placeholder="如 10"></div><div><label>冻结线%（≥禁买）</label><input type="number" step="any" id="fCap" placeholder="如 13"></div></div>
<div class="form-row two"><div><label>个股当前价格</label><input type="number" step="any" id="fCurrentPrice" placeholder="个股/观察仓填写"></div><div><label>ETF当前市值</label><input type="number" step="any" id="fCurrentValue" placeholder="ETF填写"><div class="card-note">请按该 ETF 原始计价货币填写；港股 ETF 通常为 HKD。ETF 触发价按单位净值/单价判断，优先使用刷新得到的单位价格；没有单位价格时按当前市值 / 份额反推。</div></div></div>
<div class="form-row two"><div><label>仓位角色</label><select id="fRole"><option>核心仓</option><option>成长仓</option><option>卫星仓</option><option>观察仓</option><option>防御核心仓</option><option>现金</option></select></div><div><label>主题分类</label><select id="fTheme"><option>宽基指数</option><option>黄金资源</option><option>AI科技</option><option>消费</option><option>防御</option><option>现金</option><option>其他</option></select></div></div>
<div class="form-row"><label>为什么持有 / 建仓逻辑</label><textarea id="fThesis" placeholder="买它的理由、核心变量、未来要跟踪什么"></textarea></div>
<div class="form-row"><label>什么情况下卖出 / 降仓</label><textarea id="fSellRule" placeholder="逻辑破坏、估值过热、仓位超标、到达止盈区间等"></textarea></div>
<div class="form-row"><label>补充纪律 / 备注</label><textarea id="fNotes" placeholder="不为解套补仓、只做再平衡、观察仓不升级等"></textarea></div>
<div class="form-row"><label>加仓 / 建仓动作</label><div class="plan-editor"><table class="plan-table"><thead><tr><th>触发价格</th><th>数量</th><th>动作备注</th><th></th></tr></thead><tbody id="buyRows"></tbody></table><button class="link-btn" id="addBuy" type="button">＋ 添加一档</button></div></div>
<div class="form-row" id="sellBox"><label>减仓 / 止盈动作</label><div class="plan-editor"><table class="plan-table"><thead><tr><th>触发价格</th><th>数量</th><th>动作备注</th><th></th></tr></thead><tbody id="sellRows"></tbody></table><button class="link-btn" id="addSell" type="button">＋ 添加一档</button></div></div>
<div class="modal-actions"><button class="btn ghost" id="testCodeBtn" type="button">测试行情代码</button><button class="btn ghost" id="cancelBtn">取消</button><button class="btn" id="saveBtn">保存</button></div></div></div>
<script src="src/state.js"></script>
<script src="src/import-export.js"></script>
<script src="src/position.js"></script>
<script src="src/rebalance.js"></script>
<script src="src/social.js"></script>
<script src="src/ui-render.js"></script>
<script src="src/price-refresh.js"></script>
<script src="src/app.js"></script></body></html>
